.pe-name{flex:1;font-weight:700;}
.pe-res{font-size:11.5px;font-weight:800;padding:3px 9px;border-radius:7px;}
.pe-res.ok{background:var(--gruen-soft);color:#7fcf9a;}
.pe-res.no{background:rgba(207,90,72,.14);color:#e3a294;}
.pf-del{width:100%;margin-top:8px;padding:13px;border:1px solid rgba(207,90,72,.3);border-radius:12px;color:#cf5a48;font-weight:700;font-size:13.5px;background:transparent;}
.pf-rename{flex:1;margin-top:8px;padding:13px;border:1px solid var(--line);border-radius:12px;color:var(--txt);font-weight:700;font-size:13.5px;background:var(--surface);}
.pf-rename:active{background:var(--surface-2);}
/* Route-Sheet */
.sheet-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
.ort-chip{font-size:13px;font-weight:600;background:var(--surface-2);border:1px solid var(--line);border-radius:18px;padding:8px 13px;color:var(--txt);}
.ort-chip:active{background:var(--gruen-soft);border-color:var(--gruen-line);}
.sheet-or{font-size:11.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-bottom:10px;}
.route-preview{display:flex;flex-wrap:wrap;align-items:center;gap:6px;background:var(--bg-soft);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:14px;min-height:48px;}
.route-preview .arr{color:var(--gruen-bright,#4a8b45);font-weight:800;}
.rp-chip{font-size:13px;font-weight:700;background:var(--gruen-soft);border:1px solid var(--gruen-line);color:#bcd6c5;border-radius:16px;padding:6px 11px;display:inline-flex;align-items:center;gap:6px;}
.rp-chip i{font-style:normal;opacity:.6;font-size:11px;}
.sheet-scrim{position:fixed;inset:0;background:rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:opacity .2s;z-index:60}
.sheet-scrim.open{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:61;background:var(--bg-soft);border-top:1px solid var(--line);border-radius:20px 20px 0 0;padding:22px var(--pad) calc(26px + env(safe-area-inset-bottom));transform:translateY(100%);transition:transform .26s var(--ease);max-height:80vh;overflow-y:auto}
.sheet.open{transform:translateY(0)}
.sheet-h{font-family:'Anton',sans-serif;text-transform:uppercase;font-size:16px;letter-spacing:.04em;margin-bottom:16px}
.sheet-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.sl-item{display:flex;flex-direction:column;align-items:flex-start;gap:2px;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:13px 15px;text-align:left}
.sl-item>span:first-child{font-weight:700;font-size:14px}
.sl-sub{font-size:12px;color:var(--muted)}
.field{margin-bottom:16px}


/* ===== Suche + PDF/Druck ===== */
.search-wrap{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:0 12px;margin-bottom:16px}
.search-wrap:focus-within{border-color:var(--orange-line)}
.search-ic{color:var(--muted);display:flex;flex:0 0 auto}
.search-ic svg{width:18px;height:18px}
.search-wrap input{flex:1;background:transparent;border:none;padding:13px 0;font-size:15px;color:var(--txt)}
.search-wrap input:focus{outline:none}
.search-clear{width:26px;height:26px;border-radius:8px;background:var(--surface-2);color:var(--muted);font-size:12px;flex:0 0 auto}
.no-hit{color:var(--muted);font-size:14px;text-align:center;padding:30px 0}
#printRoot{display:none}
@media print{
  html,body{height:auto!important;min-height:100%!important;overflow:visible!important;background:#fff!important;position:static!important;}
  body.printing>*{display:none!important}
  body.printing>#printRoot{display:block!important;position:static!important;height:auto!important;min-height:100%!important;overflow:visible!important;width:100%!important;padding:0!important;}
  #printRoot,.pr-doc{height:auto!important;min-height:auto!important;overflow:visible!important;max-height:none!important;}
  .pr-doc{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .pr-sec{break-inside:avoid;page-break-inside:avoid;margin-bottom:10px;}
  .pr-sec h3{break-after:avoid;page-break-after:avoid;}
  .pr-tbl{width:100%;border-collapse:collapse;}
  .pr-tbl tr{break-inside:avoid;page-break-inside:avoid;}
  .pr-tbl td{padding:3px 6px;border-bottom:1px solid #eee;font-size:11px;}
  @page{margin:14mm;size:A4 portrait;}
}
.pr-doc{color:#111;background:#fff;font-family:Arial,Helvetica,sans-serif;font-size:12px;line-height:1.5}
.pr-top{border-bottom:2px solid #E8451F;padding-bottom:8px;margin-bottom:14px}
.pr-brand{font-size:11px;color:#E8451F;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.pr-title{font-size:22px;font-weight:800;margin-top:2px}
.pr-meta{font-size:14px;margin-bottom:4px}
.pr-prog{font-size:12px;color:#333;margin-bottom:14px}
.pr-sec{margin-bottom:14px}
.pr-sec h3{font-size:13px;font-weight:800;border-bottom:1px solid #ccc;padding-bottom:4px;margin:0 0 8px;display:flex;justify-content:space-between}
.pr-cnt{font-weight:600;color:#666;font-size:11px}
.pr-list{font-size:12px}
.pr-sub{font-size:11px;color:#555;margin-top:6px}
.pr-tbl{width:100%;border-collapse:collapse}
.pr-tbl td{padding:3px 6px;border-bottom:1px solid #eee;font-size:11.5px;vertical-align:top}
.pr-tbl td:last-child{width:64px;text-align:right;font-weight:700}
.pr-ort{color:#888;font-weight:400}
.pr-gruen{color:#2e8b57}.pr-gelb{color:#b8860b}.pr-rot{color:#c0392b}.pr-none{color:#aaa;font-weight:400}
.pr-note{font-size:11px;color:#444;margin-top:6px;background:#f6f6f6;padding:6px 8px;border-radius:4px}
.pr-bar{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:1px solid #eee}
.pr-bv{font-weight:700}
.pr-summary{font-size:12px}
.pr-foot{margin-top:18px;border-top:1px solid #ccc;padding-top:6px;font-size:10px;color:#999}

/* ===== Lagebild / Coaching / Freigabe-Check / Risiko-Themen ===== */
.lage{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:16px 16px 14px;margin-bottom:14px}
.lage-h{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px;margin-bottom:12px}
.lage-h svg{width:18px;height:18px;color:var(--orange)}
.lage-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:520px){.lage-grid{grid-template-columns:1fr}}
.lage-sec{border-radius:12px;padding:10px 12px;background:var(--bg-soft)}
.lage-strong{border-left:3px solid var(--gruen)}
.lage-weak{border-left:3px solid var(--gelb)}
.lage-lab{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:4px;font-weight:600}
.lage-val{font-size:14px;line-height:1.45}
.lage-focus,.lage-miss{border-radius:12px;padding:10px 12px;background:var(--bg-soft);margin-top:10px}
.lage-focus{border-left:3px solid var(--orange)}
.lage-miss{border-left:3px solid var(--rot)}
.lage-miss.done{border-left-color:var(--gruen)}
.lage-warn{display:flex;gap:8px;align-items:flex-start;margin-top:10px;padding:10px 12px;border-radius:12px;background:var(--orange-soft);border:1px solid var(--orange-line);font-size:13px;line-height:1.4}
.lage-warn svg{width:16px;height:16px;color:var(--orange);flex:0 0 auto;margin-top:1px}
.coach{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px}
.coach-h{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px;margin-bottom:12px}
.coach-block{padding:10px 12px;border-radius:12px;background:var(--bg-soft);margin-bottom:8px}
.coach-block:last-child{margin-bottom:0}
.coach-block.warn{background:var(--orange-soft);border:1px solid var(--orange-line)}
.coach-lab{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:4px;font-weight:600}
.coach-txt{font-size:13.5px;line-height:1.5}
.ready-card.check{display:block}
.fcheck-list{margin:14px 0 4px;display:flex;flex-direction:column;gap:8px}
.fcheck-row{display:flex;gap:10px;align-items:flex-start;background:var(--bg-soft);border-radius:10px;padding:9px 11px}
.fcheck-body{min-width:0}
.fcheck-mark{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex:0 0 auto}
.fc-ok .fcheck-mark{background:rgba(63,174,107,.18);color:var(--gruen)}
.fc-no .fcheck-mark{background:rgba(214,69,52,.18);color:var(--rot)}
.fc-info .fcheck-mark{background:var(--surface-2);color:var(--muted)}
.fcheck-lab{font-size:14px;font-weight:600}
.fcheck-det{font-size:12.5px;color:var(--muted);margin-top:2px;line-height:1.4}
.fcheck-edit{width:100%;display:flex;align-items:center;justify-content:center;gap:6px;background:transparent;border:1px dashed var(--line);color:var(--muted);border-radius:10px;padding:10px;font-size:13px;margin:6px 0 12px;font-weight:600}
.fcheck-edit svg{width:14px;height:14px}
.risk-intro{margin-bottom:16px}
.risk-lead{font-size:14px;color:var(--muted);line-height:1.55;margin:8px 0 14px}
.risk-prog{display:flex;align-items:center;gap:12px}
.risk-prog-bar{flex:1;height:8px;border-radius:99px;background:var(--surface-2);overflow:hidden}
.risk-prog-bar span{display:block;height:100%;background:var(--gruen);border-radius:99px;transition:width .4s var(--ease)}
.risk-prog-txt{font-size:13px;color:var(--muted);white-space:nowrap}
.risk-list{display:flex;flex-direction:column;gap:12px}

/* ===== Kalender ===== */
.cal-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;}
.cal-viewbtn{display:inline-flex;align-items:center;gap:7px;font-family:'Playfair Display',serif;font-size:19px;font-weight:600;color:var(--txt);}
.cal-today{padding:9px 18px;border-radius:22px;font-weight:800;font-size:13.5px;color:#eaf1ec;background:linear-gradient(160deg,var(--gruen-2,#3a7350),var(--gruen,#2f5d3f));border:1px solid rgba(150,200,165,.25);box-shadow:inset 0 1px 0 rgba(190,220,200,.2),0 4px 10px rgba(0,0,0,.3);}
.cal-today:active{transform:scale(.95);}
.cal-gear{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:var(--glass);border:1px solid var(--glass-brd);color:var(--muted);box-shadow:var(--inset-top);}
.cal-gear:active{transform:scale(.9);}
.cal-gear svg{width:19px;height:19px;}
/* Kalender-Such-Button */
.cal-search-btn{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:var(--glass);border:1px solid var(--glass-brd);color:var(--muted);box-shadow:var(--inset-top);}
.cal-search-btn:active{transform:scale(.9);}
.cal-search-btn svg{width:19px;height:19px;}
/* Kalender-Suche Sheet */
.cs-student{width:100%;display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--surface);border:1px solid var(--line-soft);border-radius:12px;margin-bottom:8px;text-align:left;}
.cs-student:active{background:var(--surface-2);transform:scale(.98);}
.cs-sname{font-size:15px;font-weight:700;color:var(--txt);}
.cs-form{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--surface-2);color:var(--muted);font-weight:700;flex:0 0 auto;}
.cs-empty{color:var(--faint);font-size:14px;padding:18px 0;text-align:center;}
.cs-stud-head{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--line-soft);}
.cs-back{font-size:13px;font-weight:800;color:var(--akzent-bright);padding:6px 0;flex:0 0 auto;}
.cs-stud-name{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;line-height:1.1;}
.cs-section-h{font-size:10.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:14px 0 8px;padding:0 2px;}
.cs-section-h.future{color:var(--akzent-bright);}
.cs-section-h.past{color:var(--faint);}
.cs-item{width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 13px;border-radius:11px;margin-bottom:6px;text-align:left;border:1px solid transparent;transition:background .12s;}
.cs-item.future{background:var(--surface);border-color:var(--line-soft);cursor:pointer;}
.cs-item.future:active{background:var(--surface-2);transform:scale(.98);}
.cs-item.past{background:transparent;border-color:var(--line-soft);cursor:pointer;opacity:.8;}
.cs-item.past:active{background:var(--surface);opacity:1;}
.csi-date{font-size:13.5px;font-weight:700;color:var(--txt);white-space:nowrap;}
.csi-info{font-size:12.5px;color:var(--muted);font-weight:600;text-align:right;}
.csi-info.exam-pass{color:var(--gruen);}
.csi-info.exam-fail{color:var(--rot);}
.csi-info.exam-future{color:#c9a227;}
.cs-arrow{font-size:14px;color:var(--faint);margin-left:4px;}
.cal-counter{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.cc-card{background:linear-gradient(160deg,var(--glass),var(--glass-2));border:1px solid var(--glass-brd);border-radius:14px;padding:13px 14px;box-shadow:inset 0 1px 0 var(--glass-brd-top);}
.cc-h{font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);font-weight:800;margin-bottom:8px;}
.cc-row{display:flex;align-items:baseline;gap:6px;}
.cc-big{font-family:'Playfair Display',serif;font-size:26px;font-weight:600;line-height:1;}
.cc-big.free{color:#bcd6c5;}
.cc-lbl{font-size:11px;color:var(--muted);font-weight:600;}
.cc-sep{flex:0 0 1px;height:18px;background:var(--line);margin:0 4px;}
/* Arbeitszeiten */
.az-sec-h{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);font-weight:800;margin:22px 0 12px;}
.az-block{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px 15px;margin-bottom:11px;}
.az-h{font-weight:800;font-size:14.5px;margin-bottom:11px;}
.az-toggle-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;}
.az-times{display:flex;align-items:center;gap:9px;}
.az-times label{font-size:12.5px;color:var(--muted);font-weight:700;}
.az-times input[type=time]{flex:1;background:var(--bg-soft);border:1px solid var(--line);border-radius:10px;padding:10px;color:var(--txt);font-size:14px;font-family:inherit;}
.cal-filters{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;-webkit-overflow-scrolling:touch;}
.cal-filters::-webkit-scrollbar{display:none;}
.cal-fchip{flex:0 0 auto;padding:7px 14px;border-radius:18px;font-size:13px;font-weight:700;background:var(--surface-2);border:1px solid var(--line);color:var(--muted);}
.cal-fchip.on{background:var(--gruen-soft);border-color:var(--gruen-line);color:#bcd6c5;}
.cal-legend-bar{display:flex;flex-wrap:wrap;gap:8px 14px;margin-bottom:14px;}
.clb-item{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--muted);}
.clb-item i{width:9px;height:9px;border-radius:2px;flex:0 0 auto;}
.cal-nav{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:16px;}
.cal-arrow{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:var(--glass);border:1px solid var(--glass-brd);color:var(--txt);box-shadow:var(--inset-top);}
.cal-arrow:active{transform:scale(.9);}
.cal-arrow svg{width:20px;height:20px;}
.cal-title-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.cal-title{text-align:center;font-family:'Playfair Display',serif;font-size:18px;font-weight:600;line-height:1.15;}
.cal-kw{font-family:'Barlow',sans-serif;font-size:11.5px;font-weight:800;letter-spacing:1px;color:var(--gruen-bright,#4a8b45);background:var(--gruen-soft,rgba(74,139,69,.12));border:1px solid var(--gruen-line,rgba(74,139,69,.3));padding:1px 9px;border-radius:999px;text-transform:uppercase;}
/* Feiertage */
.cm-cell.holiday .cm-num{color:#e0986a;font-weight:800;}
.cm-hol{width:5px;height:5px;border-radius:50%;background:#e0986a;margin-top:3px;}
.cw-col.holiday .cw-dayhead{background:rgba(224,152,106,.14);border-color:rgba(224,152,106,.3);}
.cw-col.holiday .cw-dnum{color:#e0986a;}
.cw-holiday{font-size:10.5px;font-weight:800;color:#e0986a;background:rgba(224,152,106,.12);border:1px solid rgba(224,152,106,.25);border-radius:7px;padding:4px 5px;margin-bottom:5px;line-height:1.25;text-align:center;}
.cd-holiday{background:rgba(224,152,106,.12);border:1px solid rgba(224,152,106,.3);border-radius:11px;padding:11px 14px;margin-bottom:12px;font-size:13.5px;font-weight:800;color:#e0a679;text-align:center;}
/* View-Sheet */
.cal-viewopts{display:flex;flex-direction:column;gap:8px;}
.cal-viewopt{display:flex;align-items:center;justify-content:space-between;padding:15px 16px;border-radius:14px;background:var(--surface);border:1px solid var(--line);text-align:left;}
.cal-viewopt.on{background:var(--gruen-soft);border-color:var(--gruen-line);}
.cvo-l{font-weight:800;font-size:15px;}
.cvo-s{font-size:12.5px;color:var(--muted);margin-top:2px;}
.cvo-check{color:#bcd6c5;font-weight:800;font-size:18px;}
/* Monat */
.cm-grid-h{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:8px;}
.cm-grid-h.six{grid-template-columns:repeat(6,1fr);}
.cm-grid-h div{text-align:center;font-size:11px;font-weight:800;color:var(--faint);text-transform:uppercase;letter-spacing:.04em;}
.cm-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cm-grid.six{grid-template-columns:repeat(6,1fr);}
.cm-cell{aspect-ratio:1;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:var(--surface);border:1px solid var(--line-soft);position:relative;}
.cm-cell.empty{background:transparent;border:none;}
.cm-cell.today{background:var(--gruen-soft);border-color:var(--gruen-line);}
.cm-num{font-size:15px;font-weight:700;font-family:'Playfair Display',serif;}
.cm-cell.today .cm-num{color:#bcd6c5;}
.cm-dot{width:6px;height:6px;border-radius:50%;background:var(--gruen-bright,#4a8b45);}
.cm-legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:16px;padding-top:14px;border-top:1px solid var(--line-soft);}
.cm-leg{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--muted);font-weight:600;}
.cm-leg i{width:10px;height:10px;border-radius:3px;}
/* Woche */
.cw-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:5px;}
.cw-grid.six{grid-template-columns:repeat(6,minmax(0,1fr));}
.cw-free{width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;border:1px dashed var(--line);border-radius:5px;background:transparent;padding:4px 2px;}
.cw-free-t{font-size:9px;font-weight:700;color:var(--muted);}
.cw-free-p{font-size:8.5px;font-weight:700;color:var(--gruen-bright,#4a8b45);}
.cw-col{background:var(--surface);border:1px solid var(--line-soft);border-radius:10px;padding:6px;min-height:140px;}
.cw-col.today{background:var(--gruen-soft);border-color:var(--gruen-line);}
.cw-dayhead{width:100%;display:flex;flex-direction:column;align-items:center;gap:1px;padding:5px 0 8px;border-bottom:1px solid var(--line-soft);margin-bottom:7px;}
.cw-wd{font-size:11px;font-weight:800;color:var(--faint);text-transform:uppercase;}
.cw-dnum{font-size:18px;font-weight:800;font-family:'Playfair Display',serif;}
.cw-col.today .cw-dnum{color:#bcd6c5;}
.cw-events{display:flex;flex-direction:column;gap:4px;}
.cw-ev{border-left:3px solid var(--gruen-bright,#4a8b45);background:var(--bg-soft);border-radius:6px;padding:5px 6px;text-align:left;}
.cw-ev.exam-soon{box-shadow:0 0 0 1.5px #c9a227 inset;background:rgba(201,162,39,.1);}
.cw-ev.exam-done{background:var(--bg-soft);opacity:.92;}
.cw-ev.exam-pass{background:rgba(76,175,114,.1);}
.cw-ev.exam-fail{background:rgba(217,79,79,.1);}
.exd-strike{text-decoration:line-through;opacity:.7;}
.exd-mark{font-size:10px;font-weight:800;white-space:nowrap;}
.ct-ev.exam-done .ct-ev-n .exd-strike{text-decoration:line-through;opacity:.7;}
.cw-ev.theorie{border-left-color:#9b7dc4;}
.cw-evt{display:block;font-size:10px;color:var(--muted);font-weight:700;}
.cw-evn{display:block;font-size:11.5px;font-weight:700;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cw-fz{display:block;font-size:10px;font-weight:800;color:var(--gruen-bright,#4a8b45);opacity:.85;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cw-evstat{color:var(--rot);font-size:9px;}
.cw-empty{text-align:center;color:var(--faint);font-size:12px;padding:8px 0;}
/* Tag */
.cd-summary{display:flex;gap:10px;margin-bottom:14px;}
.cd-summary span{flex:1;text-align:center;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:11px;font-size:13px;color:var(--muted);font-weight:600;}
.cd-summary b{font-family:'Playfair Display',serif;font-size:20px;color:var(--txt);font-weight:600;margin-right:4px;}
.cd-list{display:flex;flex-direction:column;gap:8px;}
.cd-row{display:flex;align-items:stretch;gap:11px;}
.cd-time{flex:0 0 52px;display:flex;flex-direction:column;align-items:flex-end;font-size:13.5px;font-weight:800;padding-top:11px;}
.cd-time span{font-size:11px;color:var(--faint);font-weight:600;}
.cd-card{flex:1;border-left:3px solid var(--gruen-bright,#4a8b45);background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:11px 13px;}
.cd-row.taken{cursor:pointer;}
.cd-name{font-weight:700;font-size:14.5px;}
.cd-art{font-size:12px;color:var(--muted);margin-top:2px;}
.cd-stat{color:var(--rot);font-weight:700;margin-left:6px;}
.cd-free{flex:1;display:flex;align-items:center;justify-content:space-between;border:1px dashed var(--line);border-radius:11px;padding:11px 13px;background:transparent;}
.cd-free-l{font-size:13px;color:var(--muted);font-weight:600;}
.cd-free-plus{font-size:12.5px;color:#9fc3ab;font-weight:800;}
.cd-empty{text-align:center;color:var(--muted);padding:30px 10px;font-size:14px;line-height:1.6;}
.cd-empty span{font-size:12.5px;color:var(--faint);}
/* Zeitachse Tagesansicht */
.ct-wrap{position:relative;margin-top:4px;padding-left:52px;}
.ct-hour{position:absolute;left:0;right:0;height:0;border-top:1px solid var(--line-soft);}
.ct-hl{position:absolute;left:0;top:-7px;font-size:10.5px;color:var(--faint);font-weight:700;width:46px;text-align:right;padding-right:8px;}
.ct-now{position:absolute;left:46px;right:0;height:2px;background:var(--gruen-bright,#4a8b45);z-index:5;box-shadow:0 0 8px rgba(74,139,69,.6);}
.ct-now::before{content:"";position:absolute;left:-5px;top:-3px;width:8px;height:8px;border-radius:50%;background:var(--gruen-bright,#4a8b45);}
.ct-events{position:absolute;left:52px;right:0;top:0;bottom:0;}
.ct-ev{position:absolute;left:2px;right:2px;background:linear-gradient(160deg,var(--surface),var(--surface-2));border:1px solid var(--line);border-left:3px solid var(--gruen-bright,#4a8b45);border-radius:9px;padding:6px 10px;overflow:hidden;cursor:pointer;box-shadow:0 3px 8px rgba(0,0,0,.2);}
.ct-ev.exam-soon{border-color:#c9a227;box-shadow:0 0 0 1.5px #c9a227,0 3px 8px rgba(0,0,0,.2);}
.ct-ev.off{opacity:.5;}
.ct-ev.off .ct-ev-n{text-decoration:line-through;}
.ct-ev-t{font-size:10px;color:var(--muted);font-weight:700;}
.ct-ev-n{font-size:13px;font-weight:700;line-height:1.2;}
.ct-ev-a{font-size:11px;color:var(--muted);}
.cd-stat{color:var(--rot);font-weight:700;margin-left:5px;}
.ct-free{position:absolute;left:2px;right:2px;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;gap:2px;border:1px dashed var(--line);border-radius:9px;padding:6px 10px;background:transparent;}
.ct-free>span:first-child{font-size:11.5px;color:var(--muted);font-weight:600;}
.ct-free-p{font-size:11px;color:#9fc3ab;font-weight:800;}
/* Event-Sheet */
.es-arten,.es-actions{display:flex;gap:8px;}
.es-art{flex:1;padding:11px 6px;border-radius:10px;font-size:13px;font-weight:700;background:var(--surface);border:1px solid var(--line);color:var(--muted);}
.es-art.on{background:var(--gruen-soft);border-color:var(--gruen-line);color:#bcd6c5;}
.es-actions{flex-direction:column;}
.es-act{padding:14px;border-radius:11px;font-size:14px;font-weight:700;background:var(--surface);border:1px solid var(--line);color:var(--txt);text-align:left;}
.es-act.primary{background:var(--gruen-soft);border-color:var(--gruen-line);color:#bcd6c5;}
.es-act.danger{color:#cf5a48;}
.es-act:active{transform:scale(.98);background:var(--surface-2);}
.es-badge{display:inline-block;font-size:11px;font-weight:800;color:var(--rot);background:rgba(207,90,72,.14);border-radius:6px;padding:2px 7px;margin-left:4px;}
.es-note{font-size:13px;color:var(--txt);background:var(--bg-soft);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:14px;line-height:1.5;font-style:italic;}
.er-sizes{display:flex;gap:8px;}
.er-size{flex:1;padding:12px 6px;border-radius:10px;font-size:13px;font-weight:700;background:var(--surface);border:1px solid var(--line);color:var(--muted);}
.er-size.on{background:var(--gruen-soft);border-color:var(--gruen-line);color:#bcd6c5;}
.az-add-pause{width:100%;border:1px dashed var(--line);border-radius:12px;padding:13px;color:#9fc3ab;font-weight:700;font-size:13.5px;background:var(--gruen-soft);margin-bottom:6px;}
.az-pause{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:9px;}
.azp-info{display:flex;flex-direction:column;gap:2px;}
.azp-days{font-size:12px;color:var(--muted);font-weight:700;letter-spacing:.04em;}
.azp-time{font-weight:800;font-size:15px;}
.azp-del{width:28px;height:28px;border-radius:8px;background:var(--bg-soft);color:var(--muted);font-size:12px;flex:0 0 auto;}
.pause-days{display:flex;gap:6px;flex-wrap:wrap;}
.pday{flex:1;min-width:38px;padding:10px 4px;border-radius:9px;font-size:13px;font-weight:700;background:var(--surface);border:1px solid var(--line);color:var(--muted);}
.pday.on{background:var(--gruen-soft);border-color:var(--gruen-line);color:#bcd6c5;}
.es-statusnow{font-size:13px;color:var(--muted);margin:6px 0 14px;}
.es-statusnow b{color:var(--rot);}
.es-reset{margin-left:8px;font-size:12px;color:#9fc3ab;font-weight:700;text-decoration:underline;}
/* Kalender-FAB */
.cal-fab{position:fixed;right:18px;bottom:calc(96px + env(safe-area-inset-bottom));width:60px;height:60px;border-radius:50%;z-index:40;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,var(--gruen-2,#3a7350),var(--gruen,#2f5d3f));border:1px solid rgba(150,200,165,.3);box-shadow:0 10px 28px rgba(0,0,0,.45),inset 0 1px 0 rgba(190,220,200,.25);color:#eaf1ec;}
.cal-fab:active{transform:scale(.92);}
.cal-fab svg{width:26px;height:26px;}
/* Hinzufügen-Menü */
.add-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.add-opt{display:flex;flex-direction:column;align-items:center;gap:10px;padding:22px 12px;border-radius:16px;background:var(--surface);border:1px solid var(--line);}
.dur-row{display:flex;gap:8px;}
/* To-Dos */
.todo-tabs{display:flex;gap:8px;margin-bottom:16px;}
.todo-tab{flex:1;padding:11px;border-radius:11px;font-size:13.5px;font-weight:700;background:var(--surface);border:1px solid var(--line);color:var(--muted);display:flex;align-items:center;justify-content:center;gap:7px;}
.todo-tab.on{background:var(--gruen-soft);border-color:var(--gruen-line);color:#bcd6c5;}
.todo-sel{width:100%;background:var(--bg-soft);border:1px solid var(--line);border-radius:11px;padding:13px;color:var(--txt);font-size:14.5px;font-family:inherit;}
.todo-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.todo-item{display:flex;align-items:center;gap:11px;padding:13px 14px;border-radius:12px;background:var(--surface);border:1px solid var(--line);transition:.2s;}
.todo-item.done{opacity:.5;}
.todo-item.done .todo-txt{text-decoration:line-through;color:var(--muted);}
.todo-check{flex:0 0 auto;width:26px;height:26px;border-radius:8px;border:2px solid var(--line);background:transparent;color:#eaf1ec;font-size:14px;font-weight:800;display:flex;align-items:center;justify-content:center;}
.todo-check.on{background:var(--gruen-bright,#4a8b45);border-color:var(--gruen-bright,#4a8b45);}
.todo-txt{flex:1;font-size:14.5px;line-height:1.4;}
.todo-del{flex:0 0 auto;width:28px;height:28px;border-radius:8px;background:var(--surface-2);border:1px solid var(--line);color:var(--faint);font-size:13px;}
.todo-add{width:100%;padding:14px;border-radius:12px;font-size:14px;font-weight:700;background:var(--gruen-soft);border:1px solid var(--gruen-line);color:#bcd6c5;}
.todo-stud-row{width:100%;display:flex;align-items:center;justify-content:space-between;padding:14px 15px;border-radius:12px;background:var(--surface);border:1px solid var(--line);margin-bottom:8px;font-size:14.5px;font-weight:700;}
.dur-opt{flex:1;padding:11px 4px;border-radius:10px;font-size:12.5px;font-weight:700;background:var(--surface);border:1px solid var(--line);color:var(--muted);}
.dur-opt.on{background:var(--gruen-soft);border-color:var(--gruen-line);color:#bcd6c5;}
.ct-sf,.cw-sf{display:inline-block;font-size:9px;font-weight:800;background:#e0843a;color:#1a0f06;border-radius:4px;padding:1px 4px;margin-left:4px;vertical-align:middle;}
.add-opt:active{background:var(--surface-2);transform:scale(.97);}
.ao-ic{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;background:var(--bg-soft);box-shadow:var(--inset-top);}
.ao-ic svg{width:24px;height:24px;}
.ao-l{font-size:14px;font-weight:700;}
.as-item.on{background:var(--gruen-soft);border-color:var(--gruen-line);}

/* ===== Verdienst-Modul ===== */
.vd-card{background:linear-gradient(160deg,var(--glass),var(--glass-2));border:1px solid var(--glass-brd);border-radius:var(--r-card);padding:18px;margin-bottom:18px;box-shadow:var(--elev-3),var(--inset-top);}
.vd-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.vd-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:600;}
.vd-gear{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:var(--surface-2);border:1px solid var(--line);color:var(--muted);}
.vd-gear svg{width:17px;height:17px;}
.vd-bar-wrap{margin-bottom:18px;}
.vd-bar{position:relative;display:flex;height:38px;border-radius:11px;overflow:hidden;background:var(--bg-soft);border:1px solid var(--line);}
.vd-seg{height:100%;transition:width .6s var(--ease);}
.vd-seg.fix{background:linear-gradient(180deg,#9aa6ad,#6f7a82);}
.vd-seg.done{background:linear-gradient(180deg,var(--gruen-bright,#4a8b45),var(--gruen,#2f5d3f));}
.vd-seg.plan{background:linear-gradient(180deg,rgba(120,190,130,.55),rgba(90,160,100,.4));}
.vd-seg.bonus{background:linear-gradient(180deg,#e8c45a,#cf9a3e);}
.vd-zielline{position:absolute;top:-3px;bottom:-3px;width:2px;background:#fff;opacity:.7;z-index:3;}
.vd-zielline span{position:absolute;top:-17px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:800;color:var(--muted);white-space:nowrap;}
.vd-legend{display:flex;flex-wrap:wrap;gap:13px;margin-top:18px;}
.vl{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--muted);font-weight:600;}
.vl i{width:11px;height:11px;border-radius:3px;}
.vl i.fix{background:#88939a;}
.vl i.done{background:var(--gruen-bright,#4a8b45);}
.vl i.plan{background:rgba(120,190,130,.5);}
.vl i.bonus{background:#cf9a3e;}
.vd-nums{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:12px;}
.vd-num{background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:13px 14px;}
.vn-k{font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--faint);font-weight:800;}
.vn-v{font-family:'Playfair Display',serif;font-size:24px;font-weight:600;margin-top:5px;}
.vn-v.hl{color:#bcd6c5;}
.vn-s{font-size:11.5px;color:var(--muted);margin-top:3px;}
.vd-bonus-note{font-size:13px;color:var(--muted);text-align:center;padding:11px;background:var(--bg-soft);border:1px solid var(--line);border-radius:11px;margin-bottom:14px;}
.vd-bonus-note b{color:#bcd6c5;}
.vd-bonus-note.ok{background:rgba(207,154,62,.12);border-color:rgba(207,154,62,.3);color:#e8c45a;font-weight:700;}
.vd-offen{font-size:12.5px;color:#e3a294;background:rgba(207,90,72,.1);border:1px solid rgba(207,90,72,.25);border-radius:10px;padding:9px 12px;margin-bottom:12px;text-align:center;}
.vd-offen b{color:#f0b5a8;}
/* ===== THERMOMETER ===== */
.thermo-wrap{display:flex;gap:14px;margin-bottom:16px;}
.thermo-left{display:flex;flex-direction:column;align-items:center;flex:0 0 52px;}
.thermo-tube{width:100%;flex:1;min-height:200px;border-radius:10px 10px 6px 6px;background:var(--surface-2);border:1px solid var(--line);overflow:hidden;display:flex;flex-direction:column-reverse;position:relative;}
.th-seg{width:100%;flex:0 0 0px;transition:flex-basis .85s var(--ease);}
.th-gruen{background:linear-gradient(0deg,#1e6b38,#4caf72);}
.th-orange{background:linear-gradient(0deg,#a05c18,#e89828);}
.th-gold{background:linear-gradient(0deg,#906010,#e8c45a);}
.thermo-base{width:100%;height:26px;flex:0 0 26px;background:linear-gradient(180deg,#78868f,#5a666e);display:flex;align-items:center;justify-content:center;font-size:8.5px;font-weight:800;color:rgba(255,255,255,.85);letter-spacing:.07em;text-transform:uppercase;border-radius:0 0 6px 6px;}
.thermo-right{flex:1;position:relative;min-height:226px;}
.th-mark{position:absolute;left:0;right:0;display:flex;align-items:center;gap:7px;transform:translateY(50%);}
.th-tick{width:10px;height:1.5px;background:var(--line);flex:0 0 auto;}
.th-val{font-size:10px;font-weight:800;color:var(--muted);white-space:nowrap;}
.th-mark.t-cur .th-tick{background:var(--akzent-bright);width:14px;height:2px;}
.th-mark.t-cur .th-val{color:var(--akzent-bright);font-size:12px;}
.th-mark.t-gold .th-val{color:#d4a520;}
.th-mark.t-bonus .th-val{color:#cf9a3e;}
/* Info-Karten unter Thermometer */
.thermo-info{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.thi-card{background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:13px 14px;}
.thi-card.future{border-style:dashed;}
.thi-k{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--faint);}
.thi-v{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;margin-top:5px;color:var(--txt);line-height:1;}
.thi-s{font-size:11px;color:var(--muted);margin-top:4px;}
/* Bonus / Ziel Zeile */
.th-goal{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:11px;border:1px solid var(--line);background:var(--surface);margin-bottom:12px;}
.thg-lab{font-size:12.5px;font-weight:700;flex:1;color:var(--txt);}
.thg-val{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;color:var(--akzent-bright);white-space:nowrap;}
/* SF-Picker */
.sf-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.sf-opt{padding:11px 10px;border-radius:11px;background:var(--surface);border:1px solid var(--line);font-size:13px;font-weight:700;text-align:left;}
.sf-opt.done{opacity:.45;border-style:dashed;}
.sf-opt:active{background:var(--gruen-soft);}
/* Assign-Sheet */
.as-list{display:flex;flex-direction:column;gap:6px;max-height:50vh;overflow-y:auto;}
.as-item{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;border-radius:11px;background:var(--surface);border:1px solid var(--line);text-align:left;}
.as-item:active{background:var(--gruen-soft);}
.as-nm{font-weight:700;font-size:14px;}
.as-cls{font-size:12px;color:var(--muted);font-weight:600;}

.risk-list-end{}
.risk-item{background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--faint);border-radius:14px;padding:14px}
.risk-item.risk-unsicher{border-left-color:var(--gelb)}
.risk-item.risk-sicher{border-left-color:var(--gruen)}
.risk-name{font-weight:700;font-size:15px;margin-bottom:5px}
.risk-why{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:12px}
.risk-seg{display:flex;gap:6px}
.rseg{flex:1;padding:9px 4px;border-radius:9px;background:var(--surface-2);color:var(--muted);font-size:12.5px;font-weight:600;border:1px solid transparent;transition:.15s}
.rseg-offen.on{background:var(--surface-2);color:var(--txt);border-color:var(--line)}
.rseg-unsicher.on{background:rgba(224,163,46,.16);color:var(--gelb);border-color:rgba(224,163,46,.4)}
.rseg-sicher.on{background:rgba(63,174,107,.16);color:var(--gruen);border-color:rgba(63,174,107,.4)}

function colorDonut(cp){
  const order=["rot","gelb","gruen","blau"];
  const total=order.reduce((s,c)=>s+(cp[c]||0),0)||1;
  const r=42,cx=58,cy=58,circ=2*Math.PI*r;

      stroke-linecap="round" transform="rotate(-90 ${cx} ${cy})"/>`;
    acc+=len;return s;
  }).join("");
  const lead=order.slice().sort((a,b)=>(cp[b]||0)-(cp[a]||0))[0];
  return `<svg width="128" height="128" viewBox="0 0 116 116">${segs}

}

function planProgress(plan){

/* ===== HELL/DUNKEL TOGGLE ===== */
const THEME_KEY='serband-theme';
function applyTheme(){
  const t=localStorage.getItem(THEME_KEY)||'dark';
  document.body.classList.toggle('light',t==='light');
  const ic=$("#themeIcon"); if(!ic)return;
  if(t==='dark'){
    // Sonne anzeigen (→ Wechsel zu hell)
    ic.innerHTML='<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>';
  } else {
    // Mond anzeigen (→ Wechsel zu dunkel)
    ic.innerHTML='<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
  }
}
function toggleTheme(){
  const next=(localStorage.getItem(THEME_KEY)||'dark')==='dark'?'light':'dark';

}

/* ============================================================
   BOGEN: Auswertung
   ============================================================ */
function computeScores(answers){
  const c={rot:0,gelb:0,gruen:0,blau:0},cN={rot:0,gelb:0,gruen:0,blau:0};
  const l={visuell:0,auditiv:0,praktisch:0,tempo:0},lN={visuell:0,auditiv:0,praktisch:0,tempo:0};
  const steuer={};
  QUESTIONS.forEach(q=>{
    const raw=answers[q.id]||3;
    if(q.type==="color"){const v=q.r?(6-raw):raw;c[q.dim]+=v;cN[q.dim]++;}
    else if(q.type==="lern"){const v=q.r?(6-raw):raw;l[q.channel]+=v;lN[q.channel]++;}
    else if(q.type==="steuer"){steuer[q.key]=raw;}
  });
  const colorPct={};for(const k in c)colorPct[k]=Math.round((c[k]-cN[k])/(4*cN[k])*100);
  const lernPct={};for(const k in l)lernPct[k]=Math.round((l[k]-lN[k])/(4*lN[k])*100);
  return {colorPct,lernPct,steuer};
}
function evalBogen(b){
  const cp=b.colorPct;
  const order=["rot","gelb","gruen","blau"].sort((a,x)=>cp[x]-cp[a]);
  const top=order[0],second=order[1];
  const gap=cp[top]-cp[second],pure=gap>=18;
  const pair=colorKey(top,second),blend=BLEND[pair];
  const extra=(cp.rot+cp.gelb)-(cp.gruen+cp.blau);
  const bez=(cp.gelb+cp.gruen)-(cp.rot+cp.blau);
  const lOrder=["visuell","auditiv","praktisch"].sort((a,x)=>b.lernPct[x]-b.lernPct[a]);
  return {top,second,gap,pure,pair,blend,extra,bez,lTop:lOrder[0],tempoHigh:b.lernPct.tempo>=60};
}
function buildSummary(s,E){
  const b=s.bogen,I=COLOR_INFO[E.top],I2=COLOR_INFO[E.second];
  const EX=COLOR_EXTRA[E.top],EX2=COLOR_EXTRA[E.second],L=LERN_INFO[E.lTop];
  const lines=[];
  lines.push("TYP-PROFIL (Aufnahmebogen Fahrlehrer Serband)");
  const head=E.pure?`${I.name} – ${I.label} (Zweittendenz ${I2.name})`:`${I.name}-${I2.name} · ${E.blend.label}`;
  lines.push(`${s.name||"Schüler"} · ${head}`);
  lines.push(`Grundausrichtung: ${axisDesc(E.extra,AXES.extra)}; ${axisDesc(E.bez,AXES.bez)}.`);
  lines.push("");
  lines.push("Umgang: "+firstSentence(I.talk));
  if(!E.pure)lines.push(`Dazu ${I2.name}: `+lcFirst(firstSentence(I2.talk)));
  const st=E.pure?EX.staerken.slice(0,3):EX.staerken.slice(0,2).concat([EX2.staerken[0]]);
  lines.push("Stärken: "+st.join(" · "));
  lines.push("Blinder Fleck: "+firstSentence(EX.blind));
  lines.push("Motiviert: "+I.mot.slice(0,3).join(" · "));
  lines.push("Stresst: "+I.stress.slice(0,3).join(" · "));
  const tempo=E.tempoHigh?"braucht viele Wiederholungen, kleine Schritte":"normales Lerntempo";
  lines.push(`Lernen: am liebsten ${L.name} · ${tempo}`);
  const auff=STEUER_Q.map(q=>{
    const v=b.steuer[q.key]||3;
    if(v>=4)return `- ${STEUER_INFO[q.key].label}: ${firstSentence(STEUER_INFO[q.key].high)}`;
    if(v<=2)return `- ${STEUER_INFO[q.key].label}: ${firstSentence(STEUER_INFO[q.key].low)}`;
    return null;}).filter(Boolean);
  if(auff.length){lines.push("");lines.push("Hinter dem Steuer:");auff.forEach(a=>lines.push(a));}
  const ow=OPEN_Q.filter(q=>(b.open[q.key]||"").length>0);
  if(ow.length){lines.push("");lines.push("Eigene Worte:");ow.forEach(q=>lines.push(`- ${q.label}: ${b.open[q.key]}`));}
  return lines.join("\n");
}

function stdCellHTML(n,o,fc){
  return `<div class="std${o?' filled':''}" data-std="${n}">

    <button class="fc${fc?' on':''}" title="Fahrchecks abgegeben">FC</button>
  </div>`;
}
function buildStunden(s){
  const pl=s.plan,g=$("#stdGrid");
  let html="";for(let i=1;i<=30;i++)html+=stdCellHTML(i,pl.stunden[i],pl.fahrcheck[i]);
  g.innerHTML=html;
  g.querySelectorAll(".std").forEach(cell=>{
    const n=cell.dataset.std;
    cell.addEventListener("click",e=>{
      if(e.target.closest(".cal")||e.target.closest(".fc"))return;
      if(pl.stunden[n])delete pl.stunden[n];else pl.stunden[n]=heute();
      paintStd(cell,pl.stunden[n],pl.fahrcheck[n]);save();refreshPlanRing(s);});
    cell.querySelector(".cal").addEventListener("click",e=>{e.stopPropagation();
      _cal={sid:s.id,kind:"std",n,grp:null,idx:null};openPicker(pl.stunden[n]);});
    cell.querySelector(".fc").addEventListener("click",e=>{e.stopPropagation();
      pl.fahrcheck[n]=!pl.fahrcheck[n];

  });

function paintStd(cell,o,fc){
  cell.classList.toggle("filled",!!o);
  cell.querySelector(".d").textContent=o?o.d:"";
  const f=cell.querySelector(".fc");if(f)f.classList.toggle("on",!!fc);
  cell.classList.remove("pop");void cell.offsetWidth;cell.classList.add("pop");
}
function buildSonder(s){
  const pl=s.plan;
  SONDER_DEF.forEach(sd=>{
    const g=document.querySelector(`[data-sgrid="${sd.key}"]`);if(!g)return;
    const arr=pl.sonder[sd.key]||(pl.sonder[sd.key]=[]);
    let html="";for(let i=0;i<sd.soll;i++){
      const o=arr[i]; const done=sfDone(o);
      html+=`<div class="std${done?' filled':''}" data-sn="${i}">
        <div class="std-top"><span class="n">${pad2(i+1)}</span><button class="cal" title="Anderes Datum">📅</button></div>

    const cnt=$("#c_"+sd.key);if(cnt)cnt.textContent=sfCount(arr);
    g.querySelectorAll(".std").forEach(cell=>{
      const i=+cell.dataset.sn;
      cell.addEventListener("click",e=>{
        if(e.target.closest(".cal"))return;
        if(sfDone(arr[i])){ arr[i]=null; } else { arr[i]=heute(); }

        cell.classList.toggle("filled",done);
        cell.querySelector(".d").textContent=done?arr[i].d:"";
        cell.classList.remove("pop");void cell.offsetWidth;cell.classList.add("pop");

      cell.querySelector(".cal").addEventListener("click",e=>{e.stopPropagation();

      const panel=hasInfo?`<div class="skill-info" data-panel="${it.id}"><div class="si-inner">${renderInfoList(it.id)}</div></div>`:"";
      const ampelHtml=st.eval===false
        ? `<div class="ampel"><button class="amp chk ${v==='gruen'?'on':''}" data-v="gruen" aria-label="erledigt"></button></div>`
        : `<div class="ampel">${["rot","gelb","gruen"].map(c=>`<button class="amp ${v===c?'on':''}" data-v="${c}" aria-label="${c}"></button>`).join("")}</div>`;
      return grpHtml+`<div class="skill-wrap">
        <div class="skill" data-skill="${it.id}">
          <div style="flex:1"><div class="sk-head"><span class="sk-t">${esc(it.t)}</span>${iBtn}</div>${it.ort?`<div class="sk-ort">📍 ${esc(it.ort)}</div>`:""}</div>
          ${ampelHtml}
        </div>${panel}
      </div>`;}).join("");
    return `<div class="acc${si===0?' open':''}" data-acc="${st.key}">
      <button class="acc-h"><span class="nr">${st.nr}</span><span class="ti">${esc(st.titel)}</span>
        <span class="done" data-done="${st.key}">${done}/${total}</span><span class="chev">${ICN.chev}</span></button>
      <div class="acc-body"><div class="acc-inner">
        ${st.eval===false?`<div class="legende" style="margin:0 0 10px;">Nur abhaken – zählt nicht in die Prozente des Ausbildungsplans.</div>`:""}
        ${rows}
        <div class="stufe-note"><textarea data-note="${st.key}" placeholder="Notizen zur ${esc(st.titel)} …">${esc(pl.notes[st.key]||"")}</textarea></div>
      </div></div></div>`;
  }).join("");
  wrap.querySelectorAll(".acc-h").forEach(h=>h.addEventListener("click",()=>{
    h.closest(".acc").classList.toggle("open");}));
  wrap.querySelectorAll(".iBtn").forEach(b=>b.addEventListener("click",e=>{
    e.stopPropagation();
    const panel=wrap.querySelector(`[data-panel="${b.dataset.info}"]`);
    if(panel){const open=panel.classList.toggle("open");b.classList.toggle("on",open);}}));
  wrap.querySelectorAll(".skill").forEach(row=>{
    const sid=row.dataset.skill;
    row.querySelectorAll(".amp").forEach(b=>b.addEventListener("click",()=>{
      const v=b.dataset.v;
      if(pl.ampeln[sid]===v){delete pl.ampeln[sid];}else{pl.ampeln[sid]=v;}
      row.querySelectorAll(".amp").forEach(x=>x.classList.toggle("on",x.dataset.v===pl.ampeln[sid]));
      const st=STUFEN.find(t=>t.items.some(i=>i.id===sid));
      const d=wrap.querySelector(`[data-done="${st.key}"]`);
      if(d)d.textContent=st.items.filter(i=>pl.ampeln[i.id]==="gruen").length+"/"+st.items.length;
      save();refreshPlanRing(s);
    }));});
  wrap.querySelectorAll("[data-note]").forEach(t=>t.addEventListener("input",()=>{
    pl.notes[t.dataset.note]=t.value;save();}));
}

function fitCanvas(){

  _board.width=Math.round(_W*_dpr);_board.height=Math.round(_H*_dpr);

  _sCanvas=document.createElement("canvas");_sCanvas.width=_board.width;_sCanvas.height=_board.height;
  _sCtx=_sCanvas.getContext("2d");_sCtx.setTransform(_dpr,0,0,_dpr,0,0);_sCtx.lineCap="round";_sCtx.lineJoin="round";
  rebuildStrokes();

function rebuildStrokes(){

    const p=st.pts;
    if(p.length===1){_sCtx.beginPath();_sCtx.arc(p[0][0],p[0][1],st.width/2,0,7);_sCtx.fill();}
    else{_sCtx.beginPath();_sCtx.moveTo(p[0][0],p[0][1]);for(let i=1;i<p.length;i++)_sCtx.lineTo(p[i][0],p[i][1]);_sCtx.stroke();}
  });

}
function drawSeg(st){

function onDown(e){

  const a=pos(e),x=a[0],y=a[1];_moved=false;

    const m=sel();

      const rh=worldOf(m,0,-(wh.h/2+24));if(dist(x,y,rh[0],rh[1])<=20){_drag={mode:"rotate",o:m};return;}
      const sh=worldOf(m,wh.w/2+4,wh.h/2+4);if(dist(x,y,sh[0],sh[1])<=20){_drag={mode:"resize",o:m,d0:Math.max(8,dist(x,y,m.x,m.y)),sc0:m.scale||1};return;}

  const sizes=[["1","Fein"],["2","Mittel"],["4","Grob"]];

    <div class="es-actions" style="margin-top:6px;">

      <button class="es-act danger" id="erClearAll">Alles löschen (auch Objekte)</button>
    </div>`);
  document.querySelectorAll(".er-size").forEach(b=>b.addEventListener("click",()=>{ DRAW.eraseSize=+b.dataset.ersize; document.querySelectorAll(".er-size").forEach(x=>x.classList.toggle("on",x===b)); }));
  $("#erStroke").addEventListener("click",()=>{ DRAW.eraseStroke=!DRAW.eraseStroke; $("#erStroke").classList.toggle("on",DRAW.eraseStroke); });
  $("#erClearStrokes").addEventListener("click",()=>{ if(DRAW.strokes.length){ DRAW.strokes=[]; rebuildStrokes(); render(); persistBoard(); toast("Zeichnungen gelöscht"); } closeSheet(); });
  $("#erClearAll").addEventListener("click",()=>{ DRAW.strokes=[];DRAW.objects=[];DRAW.history=[];DRAW.selId=null;rebuildStrokes();render();persistBoard();toast("Tafel geleert"); closeSheet(); });
}
function transformSel(act){const m=sel();if(!m)return;
  if(act==="rot")m.rot=((m.rot||0)+Math.PI/2)%(Math.PI*2);
  else if(act==="dup"){dupSel();return;}
  else if(act==="del"){DRAW.objects=DRAW.objects.filter(x=>x.id!==m.id);DRAW.history=DRAW.history.filter(o=>!(o.t==="object"&&o.id===m.id));DRAW.selId=null;}
  else if(act==="done"){DRAW.selId=null;}
  render();persistBoard();
}
function exportBoard(){DRAW.selId=null;render();try{const url=_board.toDataURL("image/png");const a=document.createElement("a");a.href=url;a.download="Tafel_"+heute().d.replace(/\./g,"-")+".png";a.click();toast("Als Bild exportiert");}catch(e){toast("Export nicht möglich");}}
function persistBoard(){try{DB.boardCurrent={objects:DRAW.objects,strokes:DRAW.strokes,seq:DRAW.seq,night:!!DRAW.night};save();}catch(_){}}
function saveBoard(){const name=((typeof prompt==="function"?prompt("Name für das Tafelbild:"):"")||"").trim();if(!name)return;if(!DB.boards)DB.boards=[];DB.boards.push({id:Date.now(),name,ts:heute().d,objects:JSON.parse(JSON.stringify(DRAW.objects)),strokes:JSON.parse(JSON.stringify(DRAW.strokes))});save();toast("Tafelbild gespeichert");}
function loadBoard(id){const b=(DB.boards||[]).find(x=>x.id===id);if(!b)return;DRAW.objects=JSON.parse(JSON.stringify(b.objects||[]));DRAW.strokes=JSON.parse(JSON.stringify(b.strokes||[]));DRAW.selId=null;DRAW.seq=(DRAW.objects.reduce((m,o)=>Math.max(m,o.id||0),0)||0)+1;rebuildStrokes();render();persistBoard();closeTafelDrawer();toast("Tafelbild geladen");}
function deleteBoard(id){if(!confirm("Dieses Tafelbild löschen?"))return;DB.boards=(DB.boards||[]).filter(x=>x.id!==id);save();renderDrawerBody();}

function updateObjCtrl(){const c=$("#objCtrl");if(c)c.hidden=!DRAW.selId;}
function setActiveTool(){const s=$("#dbSelect"),p=$("#dbPen"),e=$("#dbErase");if(s)s.classList.toggle("on",DRAW.tool==="select");if(p)p.classList.toggle("on",DRAW.tool==="pen");if(e)e.classList.toggle("on",DRAW.tool==="erase");}
function updateDrawerUI(){
  const d=$("#tafelDrawer");if(d)d.classList.toggle("open",!!DRAW.drawerOpen);

      $("#mLoad").addEventListener("click",()=>{DRAW.loadView=true;renderDrawerBody();});

function renderObjGrid(){
  const g=$("#objGrid");if(!g)return;
  if(DRAW.cat==="szenen"){
    g.innerHTML=Object.keys(PRESETS).map(k=>{const p=PRESETS[k];const th=OBJ_BY_TYPE[p.thumb]?OBJ_BY_TYPE[p.thumb].svg:"";return `<button class="mag-item" data-preset="${k}"><img src="data:image/svg+xml;utf8,${encodeURIComponent(th)}" alt=""><span>${p.label}</span></button>`;}).join("");
    g.querySelectorAll(".mag-item").forEach(b=>b.addEventListener("click",()=>placePreset(b.dataset.preset)));
  }else{
    const items=OBJ.filter(d=>d.cat===DRAW.cat);
    g.innerHTML=items.map(d=>`<button class="mag-item" data-obj="${d.type}"><img src="data:image/svg+xml;utf8,${encodeURIComponent(d.svg)}" alt=""><span>${d.label}</span></button>`).join("");
    g.querySelectorAll(".mag-item").forEach(b=>b.addEventListener("click",()=>placeObject(b.dataset.obj)));

}
function renderLoadList(){
  const g=$("#loadList");if(!g)return;const bs=DB.boards||[];
  g.innerHTML=bs.length?bs.map(b=>`<div class="tb-load-row"><button class="tb-load" data-load="${b.id}"><span class="tb-name">${esc(b.name)}</span><span class="tb-date">${esc(b.ts||"")}</span></button><button class="tb-del" data-del="${b.id}" aria-label="Löschen">🗑</button></div>`).join(""):`<div class="tb-empty">Noch keine Tafelbilder gespeichert.</div>`;
  g.querySelectorAll(".tb-load").forEach(b=>b.addEventListener("click",()=>loadBoard(+b.dataset.load)));
  g.querySelectorAll(".tb-del").forEach(b=>b.addEventListener("click",()=>deleteBoard(+b.dataset.del)));

  $("#drawBack").addEventListener("click",routeHome);

function formView(existing){

  const s=existing||{name:"",form:"B",beginn:"",profil:null,next:"",nextDate:"",nextTime:""};
  $("#tbTitle").textContent=isEdit?"Schüler bearbeiten":"Neuer Schüler";setFab(false);view.scrollTop=0;

    profCard=`<div class="hint-card"><div class="ns-ic">${ICN.profile}</div>
      <div style="flex:1"><div style="font-weight:800;font-size:14.5px;">Profil aus dem Bogen: ${PROFILE[E.top].word}${E.pure?"":"-"+PROFILE[E.second].word}</div>

    profCard=`<div class="field"><label>Farbprofil <span style="color:var(--faint);font-weight:600">· optional – setzt sich automatisch durch den Bogen</span></label>
      <div class="color-opts" id="colorOpts">${Object.entries(PROFILE).map(([k,p])=>`

  }
  view.innerHTML=`<div class="view-inner view-read fade-up">
    <div class="back-row"><button class="back-btn" id="backBtn">${ICN.back} Zurück</button></div>
    <div class="sec-h" style="margin-bottom:22px;">${isEdit?"Schüler <span class='o'>bearbeiten</span>":"Neuer <span class='o'>Schüler</span>"}</div>
    <div class="form-block">
      <div class="field"><label>Vollständiger Name</label>
        <input id="f_name" type="text" placeholder="Vor- und Nachname" value="${esc(s.name)}" autocomplete="off"></div>
      <div class="field"><label>Ausbildungsform</label>
        <div class="pills" id="formPills">${FORMS.map(f=>`<button class="pill ${s.form===f?'sel':''}" data-form="${f}">${formLabel(f)}</button>`).join("")}</div></div>
      <div class="field"><label style="display:flex;align-items:center;gap:8px;">Beginn der Ausbildung <span style="font-size:11.5px;font-weight:600;color:var(--faint);background:var(--surface-2);padding:2px 8px;border-radius:6px;">optional</span></label>
        <input id="f_beginn" type="text" placeholder="TT.MM.JJJJ" value="${esc(s.beginn||"")}" autocomplete="off"></div>
      ${hasBogen?profCard:""}
      <div class="btn-row">
        <button class="btn btn-primary" id="saveBtn">${isEdit?"Änderungen speichern":"Schüler anlegen →"}</button>
        ${isEdit?"":`<button class="btn btn-ghost" id="cancelBtn">Abbrechen</button>`}</div>
    </div></div>`;
  let pick={form:s.form,profil:s.profil};
  $("#backBtn").addEventListener("click",()=>isEdit?routeDetail(s.id):routeHome());
  const cb=$("#cancelBtn");if(cb)cb.addEventListener("click",routeHome);
  document.querySelectorAll("#formPills .pill").forEach(b=>b.addEventListener("click",()=>{
    document.querySelectorAll("#formPills .pill").forEach(x=>x.classList.remove("sel"));
    b.classList.add("sel");pick.form=b.dataset.form;}));
  document.querySelectorAll("#colorOpts .color-opt").forEach(b=>b.addEventListener("click",()=>{
    const was=b.classList.contains("sel");
    document.querySelectorAll("#colorOpts .color-opt").forEach(x=>x.classList.remove("sel"));
    if(was){pick.profil=null;}else{b.classList.add("sel");pick.profil=b.dataset.col;}}));
  $("#saveBtn").addEventListener("click",()=>{
    const name=$("#f_name").value.trim();
    if(!name){toast("Bitte einen Namen eingeben");$("#f_name").focus();return;}
    const data={name,form:pick.form||"B",beginn:$("#f_beginn").value.trim()};
    if(!hasBogen)data.profil=pick.profil||null;
    if(isEdit){Object.assign(existing,data);save();toast("Gespeichert");routeDetail(existing.id);}
    else{const nst={id:uid(),created:Date.now(),notiz:"",bogen:null,plan:newPlan(),profil:data.profil||null,...data};
      DB.students.push(nst);save();routeBogen(nst.id,true);}
  });
}
function routeSettings(){
  $("#tbTitle").textContent="Datensicherung";setFab(false);view.scrollTop=0;
  view.innerHTML=`<div class="view-inner view-read fade-up">
    <div class="sec-h" style="margin:6px 0 8px;">Daten<span class="o">sicherung</span></div>
    <p style="color:var(--muted);font-size:14px;margin-bottom:20px;">Alle Daten liegen nur auf diesem Gerät. Sichere sie regelmäßig als Datei – und spiele sie auf einem neuen Gerät einfach wieder ein.</p>
    <div class="res-block" style="animation:none;"><h4>Sichern</h4>
      <p>Erstellt eine Datei mit allen Schülern, Plänen und Profilen.</p>
      <div class="btn-row"><button class="btn btn-primary" id="expBtn">${ICN.down} Backup herunterladen</button></div></div>
    <div class="res-block" style="animation:none;"><h4>Wiederherstellen</h4>
      <p>Lädt ein Backup und ersetzt die aktuellen Daten.</p>
      <input type="file" id="impFile" accept="application/json" style="display:none">
      <div class="btn-row"><button class="btn btn-ghost" id="impBtn">${ICN.up} Backup einspielen</button></div></div>
  </div>`;
  $("#expBtn").addEventListener("click",()=>{
    try{
      const blob=new Blob([JSON.stringify({app:"serband",version:1,datum:new Date().toISOString(),data:DB},null,1)],{type:"application/json"});
      const a=document.createElement("a");a.href=URL.createObjectURL(blob);
      a.download="Fahrlehrer-Kompass_Backup_"+heute().d.replace(/\./g,"-")+".json";a.click();
      setTimeout(()=>URL.revokeObjectURL(a.href),1000);toast("Backup erstellt");
    }catch(e){toast("Backup nicht möglich");}});
  $("#impBtn").addEventListener("click",()=>$("#impFile").click());
  $("#impFile").addEventListener("change",e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=()=>{try{
      const j=JSON.parse(r.result);
      if(!j||j.app!=="serband"||!j.data||!Array.isArray(j.data.students))throw 0;
      if(confirm("Backup einspielen? Die aktuellen Daten werden ersetzt.")){
        DB=j.data;ensureDB();save();toast("Backup eingespielt");routeDashboard();}
    }catch(_){toast("Keine gültige Backup-Datei");}};
    r.readAsText(f);});
}

/* Fahrstunde/Theorie/Nacht hinzufügen */
function openAddLessonSheet(art){
  ensureDB();
  const cand=activeStudents().sort((a,b)=>a.name.localeCompare(b.name,'de'));
  const def=CAL_ARTEN[art]||CAL_ARTEN.fahrstunde; const lab=def.lab;
  const isSchalt=art==="schalt"; const blockMin=DB.workCfg.blockMin||90;
  const defDate=_calView==="tag"?_calDate:todayISO();
  const defTime=art==="theorie"?"18:00":art==="nacht"?"19:30":"10:00";
  // Schritt 1: Schüler wählen
  openSheet(`<div class="sheet-h">${lab} · mit wem?</div>
    <div class="field"><input type="text" id="alSearch" placeholder="Schüler suchen …" autocomplete="off"></div>
    <div class="as-list" id="alList">${cand.map(s=>`<button class="as-item" data-sid="${s.id}"><span class="as-nm">${esc(s.name)}</span><span class="as-cls">${esc(s.form||'')}</span></button>`).join("")}</div>`);
  const renderList=(q)=>{ const list=cand.filter(s=>matchStudent(s.name,q)); $("#alList").innerHTML=list.map(s=>`<button class="as-item" data-sid="${s.id}"><span class="as-nm">${esc(s.name)}</span><span class="as-cls">${esc(s.form||'')}</span></button>`).join("")||'<p class="muted-p" style="font-size:13px;">Kein Treffer</p>'; bindList(); };
  const bindList=()=>{ document.querySelectorAll("#alList .as-item").forEach(b=>b.addEventListener("click",()=>step2(b.dataset.sid))); };
  $("#alSearch").addEventListener("input",e=>renderList(e.target.value));
  bindList();
  // Schritt 2: Datum, Zeit, Dauer, Notiz
  function step2(sid){
    const st=DB.students.find(s=>s.id===sid);
    const durOpts=isSchalt?"":`<div class="field"><label>Dauer</label><div class="dur-row">${[[1,"1× (90 Min)"],[2,"2× (3 Std)"],[3,"3× (4,5 Std)"]].map(([n,l])=>`<button class="dur-opt${n===1?' on':''}" data-dur="${n}">${l}</button>`).join("")}</div></div>`;
    openSheet(`<div class="sheet-h">${lab}</div>
      <p class="muted-p" style="font-size:13.5px;margin:-4px 0 14px;">${esc(st?st.name:"")}</p>
      <div class="field"><label>Datum</label><input type="date" id="alDate" value="${defDate}"></div>
      <div class="field"><label>Uhrzeit (Beginn)</label><input type="time" id="alTime" value="${defTime}"></div>
      ${durOpts}
      ${isSchalt?`<p class="muted-p" style="font-size:12.5px;margin:-6px 0 12px;">Schaltkompetenz wird als 15-Minuten-Termin geblockt.</p>`:''}
      <div class="field"><label>Notiz (optional)</label><textarea id="alNote" rows="2" placeholder="z. B. Schwerpunkt, Treffpunkt …"></textarea></div>
      <div class="btn-row"><button class="btn btn-ghost" id="alBack" style="flex:0;padding:13px 16px;">Zurück</button><button class="btn btn-primary" id="alSave">Eintragen</button></div>`);
    let dur=1;
    document.querySelectorAll(".dur-opt").forEach(b=>b.addEventListener("click",()=>{ dur=+b.dataset.dur; document.querySelectorAll(".dur-opt").forEach(x=>x.classList.toggle("on",x===b)); }));
    $("#alBack").addEventListener("click",()=>openAddLessonSheet(art));
    $("#alSave").addEventListener("click",()=>{
      const date=$("#alDate").value, von=$("#alTime").value, note=$("#alNote").value.trim();
      if(!date||!von){toast("Datum & Zeit wählen");return;}
      // Fahrzeug-Auswahl (Schritt 3)
      const fzList=DB.workCfg.fahrzeuge||[];
      const fzRelevant=["fahrstunde","sonder","nacht","schalt"].indexOf(art)>=0;
      if(fzRelevant&&fzList.length){
        openSheet(`<div class="sheet-h">Fahrzeug · ${esc(st?st.name:"")}</div>
          <p class="muted-p" style="font-size:13px;margin:-4px 0 14px;">${isoDE(date)} · ${von}</p>
          <div class="es-actions">
            ${fzList.map(fz=>`<button class="es-act fz-opt" data-fzid="${esc(fz.id)}">${esc(fz.name)}<span style="float:right;font-size:12px;opacity:.6;font-weight:600;">${fz.typ==="automatik"?"Automatik":"Schalter"}</span></button>`).join("")}
            <button class="es-act" id="fzSkip">Kein Fahrzeug (überspringen)</button>
          </div>`);
        const doBook=(fzid)=>{
          const fz=fzList.find(f=>f.id===fzid)||null;
          if(isSchalt){ addLesson({date,von,bis:min2hm(hm2min(von)+15),art,sid,note,fahrzeug:fz?fz.name:null}); }
          else { for(let i=0;i<dur;i++){ const v=min2hm(hm2min(von)+i*blockMin); addLesson({date,von:v,bis:min2hm(hm2min(v)+blockMin),art,sid,note:i===0?note:"",fahrzeug:fz?fz.name:null}); } }
          closeSheet(); toast(lab+" eingetragen ✓"); routeKalender();
        };
        document.querySelectorAll(".fz-opt").forEach(b=>b.addEventListener("click",()=>doBook(b.dataset.fzid)));
        $("#fzSkip").addEventListener("click",()=>doBook(null));
      } else {
        if(isSchalt){ addLesson({date,von,bis:min2hm(hm2min(von)+15),art,sid,note}); }
        else { for(let i=0;i<dur;i++){ const v=min2hm(hm2min(von)+i*blockMin); addLesson({date,von:v,bis:min2hm(hm2min(v)+blockMin),art,sid,note:i===0?note:""}); } }
        closeSheet(); toast(lab+" eingetragen ✓"); routeKalender();
      }
    });
  }
}

  let opts='';

    const arr=s.plan.sonder[sd.key]||(s.plan.sonder[sd.key]=[]);
    for(let i=0;i<sd.soll;i++){
      const done=sfDone(arr[i]);
      opts+=`<button class="sf-opt${done?' done':''}" data-grp="${sd.key}" data-idx="${i}">${sd.label} ${i+1}${done?` · ✓ ${arr[i].d}`:''}</button>`;

/* ===================== TO-DOS ===================== */
let _todoTab="global", _todoStudent=null;
function ensureTodos(){ if(!Array.isArray(DB.todos))DB.todos=[]; }
function studentTodos(s){ if(!Array.isArray(s.todos))s.todos=[]; return s.todos; }
function routeTodos(){
  ensureDB(); ensureTodos();
  $("#tbTitle").textContent="To-Dos"; setFab(false); view.scrollTop=0;
  const studsWithTodos=activeStudents().filter(s=>Array.isArray(s.todos)&&s.todos.length).sort((a,b)=>a.name.localeCompare(b.name,'de'));
  if(_todoTab==="student"&&_todoStudent&&!DB.students.find(s=>s.id===_todoStudent))_todoStudent=null;
  let html=`<div class="view-inner view-read fade-up">
    <div class="sec-h" style="margin-bottom:14px;">To-<span class="o">Dos</span></div>
    <div class="todo-tabs">
      <button class="todo-tab${_todoTab==='global'?' on':''}" data-tt="global">Allgemein <span class="pt-cnt">${DB.todos.filter(t=>!t.done).length}</span></button>
      <button class="todo-tab${_todoTab==='student'?' on':''}" data-tt="student">Pro Schüler</button>
    </div>`;
  if(_todoTab==="global"){
    html+=todoListHTML(DB.todos,"global");
    html+=`<button class="todo-add" id="todoAdd">+ Aufgabe hinzufügen</button>`;
  } else {
    // Schülerwahl
    html+=`<div class="field" style="margin-bottom:12px;"><select id="todoStudSel" class="todo-sel"><option value="">– Schüler wählen –</option>${activeStudents().sort((a,b)=>a.name.localeCompare(b.name,'de')).map(s=>{ const open=(s.todos||[]).filter(t=>!t.done).length; return `<option value="${s.id}"${s.id===_todoStudent?' selected':''}>${esc(s.name)}${open?` (${open})`:''}</option>`; }).join("")}</select></div>`;
    if(_todoStudent){ const s=DB.students.find(x=>x.id===_todoStudent);
      html+=todoListHTML(studentTodos(s),"student");
      html+=`<button class="todo-add" id="todoAdd">+ Aufgabe für ${esc(s.name)}</button>`;
    } else {
      // Übersicht: Schüler mit offenen To-Dos
      if(studsWithTodos.length){ html+=`<div class="blk-h">Mit offenen Aufgaben</div>`;
        studsWithTodos.forEach(s=>{ const open=s.todos.filter(t=>!t.done).length; html+=`<button class="todo-stud-row" data-tstud="${s.id}"><span>${esc(s.name)}</span><span class="pt-cnt">${open}</span></button>`; });
      } else html+=`<p class="muted-p" style="text-align:center;padding:20px;">Wähle einen Schüler, um Aufgaben anzulegen.</p>`;
    }
  }
  html+=`</div>`; view.innerHTML=html;
  document.querySelectorAll(".todo-tab").forEach(t=>t.addEventListener("click",()=>{ _todoTab=t.dataset.tt; if(_todoTab==="global")_todoStudent=null; routeTodos(); }));
  const sel=$("#todoStudSel"); if(sel)sel.addEventListener("change",()=>{ _todoStudent=sel.value||null; routeTodos(); });
  document.querySelectorAll("[data-tstud]").forEach(b=>b.addEventListener("click",()=>{ _todoStudent=b.dataset.tstud; routeTodos(); }));
  bindTodoList();
  const add=$("#todoAdd"); if(add)add.addEventListener("click",()=>openTodoAdd());
}
function todoListHTML(list,scope){
  if(!list.length)return `<p class="muted-p" style="text-align:center;padding:18px;">Noch keine Aufgaben.</p>`;
  const sorted=[...list].sort((a,b)=>(a.done?1:0)-(b.done?1:0));
  return `<div class="todo-list">${sorted.map(t=>`<div class="todo-item${t.done?' done':''}" data-tid="${t.id}">
    <button class="todo-check${t.done?' on':''}" data-tcheck="${t.id}" aria-label="abhaken">${t.done?'✓':''}</button>
    <span class="todo-txt">${esc(t.text)}</span>
    <button class="todo-del" data-tdel="${t.id}" aria-label="löschen">✕</button>
  </div>`).join("")}</div>`;
}

function eventMatchesFilter(art){ if(_calFilter==="alle")return true; return art===_calFilter; }

function calCounterHTML(){
  // Ab heute bis Ende der laufenden Woche (Sa, kein Sonntag) / des laufenden Monats
  const today=todayISO();
  const wkEnd=addDays(isoWeekStart(today),5);
  const [,moEnd]=isoMonthRange(today);
  const wkFrom=today>isoWeekStart(today)?today:isoWeekStart(today);
  const wk=countRange(wkFrom,wkEnd);
  const mo=countRange(today,moEnd);
  return `<div class="cal-counter">
    <div class="cc-card"><div class="cc-h">Rest dieser Woche</div><div class="cc-row"><span class="cc-big">${wk.planned}</span><span class="cc-lbl">geplant</span><span class="cc-sep"></span><span class="cc-big free">${wk.free}</span><span class="cc-lbl">frei</span></div></div>
    <div class="cc-card"><div class="cc-h">Rest dieses Monats</div><div class="cc-row"><span class="cc-big">${mo.planned}</span><span class="cc-lbl">geplant</span><span class="cc-sep"></span><span class="cc-big free">${mo.free}</span><span class="cc-lbl">frei</span></div></div>
  </div>`;
}
function calTitle(){
  if(_calView==="monat"){ const d=parseISO(_calDate); return deMonth(d.getMonth())+" "+d.getFullYear(); }
  if(_calView==="woche"){ const ws=isoWeekStart(_calDate); const we=addDays(ws,5); const a=parseISO(ws), z=parseISO(we); return `${a.getDate()}. ${deMonth(a.getMonth()).slice(0,3)} – ${z.getDate()}. ${deMonth(z.getMonth()).slice(0,3)}`; }
  return `${deWeekdayLong(_calDate)}, ${parseISO(_calDate).getDate()}. ${deMonth(parseISO(_calDate).getMonth())}`;
}
function calKW(){
  if(_calView==="monat"){
    const d=parseISO(_calDate); const first=dateISO(new Date(d.getFullYear(),d.getMonth(),1)); const last=dateISO(new Date(d.getFullYear(),d.getMonth()+1,0));
    const a=isoWeekNo(first), z=isoWeekNo(last);
    return a===z?`KW ${a}`:`KW ${a}–${z}`;
  }
  // Tag & Woche: eine konkrete KW
  return `KW ${isoWeekNo(_calDate)}`;
}

// Swipe nach links/rechts -> vor/zurück (Tag/Woche/Monat)
function bindCalSwipe(){
  const wrap=document.querySelector(".cal-wrap"); if(!wrap)return;
  let x0=null,y0=null;
  wrap.addEventListener("touchstart",e=>{ const t=e.touches[0]; x0=t.clientX; y0=t.clientY; },{passive:true});
  wrap.addEventListener("touchend",e=>{
    if(x0==null)return; const t=e.changedTouches[0]; const dx=t.clientX-x0, dy=t.clientY-y0;
    x0=null; if(Math.abs(dx)<55||Math.abs(dx)<Math.abs(dy)*1.3)return;
    _calDate=calShift(dx<0?1:-1); routeKalender();
  },{passive:true});
}
function calShift(dir){
  if(_calView==="monat"){ const d=parseISO(_calDate); return dateISO(new Date(d.getFullYear(),d.getMonth()+dir,Math.min(d.getDate(),28))); }
  if(_calView==="woche")return addDays(_calDate,7*dir);
  // Tagesansicht: Sonntag überspringen
  let next=addDays(_calDate,dir);
  if(weekdayMon0(next)===6)next=addDays(next,dir);
  return next;
}
function openCalViewSheet(){
  openSheet(`<div class="sheet-h">Ansicht wählen</div>
    <div class="cal-viewopts">
      ${[["tag","Tagesansicht","Ein Tag im Detail"],["woche","Wochenansicht","Die ganze Woche"],["monat","Monatsansicht","Überblick mit Punkten"]].map(([k,l,s])=>`<button class="cal-viewopt${_calView===k?' on':''}" data-v="${k}"><div><div class="cvo-l">${l}</div><div class="cvo-s">${s}</div></div>${_calView===k?'<span class="cvo-check">✓</span>':''}</button>`).join("")}
    </div>`);
  document.querySelectorAll(".cal-viewopt").forEach(o=>o.addEventListener("click",()=>{ _calView=o.dataset.v; closeSheet(); routeKalender(); }));

// MONATSANSICHT
function calMonthHTML(){
  const d=parseISO(_calDate); const y=d.getFullYear(), m=d.getMonth();
  const dim=new Date(y,m+1,0).getDate();
  const wdOf=(day)=>(new Date(y,m,day).getDay()+6)%7; // 0=Mo..6=So
  const firstWd=wdOf(1); const leadEmpty=firstWd===6?0:firstWd; // Sonntag existiert in diesem Raster nicht
  let cells=""; for(let i=0;i<leadEmpty;i++)cells+=`<div class="cm-cell empty"></div>`;
  for(let day=1;day<=dim;day++){ const w=wdOf(day); if(w===6)continue; // Sonntag überspringen – findet eh nichts statt
    const iso=dateISO(new Date(y,m,day)); const has=dayEvents(iso).some(e=>eventMatchesFilter(e.art)); const isToday=iso===todayISO(); const hol=holidayName(iso);
    cells+=`<div class="cm-cell${isToday?' today':''}${hol?' holiday':''}" data-calday="${iso}"${hol?` title="${esc(hol)}"`:''}><span class="cm-num">${day}</span>${hol?'<span class="cm-hol"></span>':(has?'<span class="cm-dot"></span>':'')}</div>`; }
  return `<div class="cm-grid-h six">${["Mo","Di","Mi","Do","Fr","Sa"].map(w=>`<div>${w}</div>`).join("")}</div><div class="cm-grid six">${cells}</div>
    <div class="cm-legend">${Object.entries(CAL_ARTEN).filter(([k,v])=>!v.hideleg&&k!=='block').map(([k,v])=>`<span class="cm-leg"><i style="background:${v.col}"></i>${v.lab}</span>`).join("")}</div>`;
}
// WOCHENANSICHT – einheitliche Kacheln: alle Standard-Slots (frei + belegt) je Tag, Sonntag entfällt
function calWeekHTML(){
  const ws=isoWeekStart(_calDate);
  let cols="";
  for(let i=0;i<6;i++){ const iso=addDays(ws,i); const isToday=iso===todayISO(); const hol=holidayName(iso);
    cols+=`<div class="cw-col${isToday?' today':''}${hol?' holiday':''}">
      <button class="cw-dayhead" data-calday="${iso}"><span class="cw-wd">${deWeekday(iso)}</span><span class="cw-dnum">${parseISO(iso).getDate()}</span></button>
      <div class="cw-events">${hol?`<div class="cw-holiday">${esc(hol)}</div>`:''}${weekDayRowsHTML(iso)}</div></div>`;
  }
  return `<div class="cw-grid six">${cols}</div>`;
}
// Kombinierte Zeilenliste für einen Tag in der Wochenansicht: Standard-Slots (frei→vergeben-Button, belegt→Chip) + Termine außerhalb des Rasters
function weekDayRowsHTML(iso){
  const slots=daySlots(iso); const evs=dayEvents(iso).filter(e=>eventMatchesFilter(e.art));
  if(!slots.length&&!evs.length)return `<div class="cw-empty">–</div>`;
  const used=new Set(); let rows="";
  slots.forEach(s=>{
    const sv=hm2min(s.von), sb=hm2min(s.bis);
    const match=evs.find(e=>{ const ev=hm2min(e.von), eb=hm2min(e.bis); return sv<eb&&sb>ev; });
    if(match){ used.add(match); rows+=calEventChip(match,iso); }
    else rows+=`<button class="cw-free" data-freeslot="${iso}|${s.von}|${s.bis}|${s.art}"><span class="cw-free-t">${s.von}</span><span class="cw-free-p">+ frei</span></button>`;
  });
  evs.forEach(e=>{ if(!used.has(e))rows+=calEventChip(e,iso); });
  return rows;
}
function sfKuerzel(e){ if(e.srcSonder){ const grp=e.srcSonder.split(":")[1]; return SF_KUERZEL[grp]||"SF"; } return "SF"; }
function firstName(n){ return (n||"").split(" ")[0]; }
function calEventChip(e,iso){
  const c=CAL_ARTEN[e.art]||CAL_ARTEN.fahrstunde;
  // Erledigte Prüfung: eigene Optik (bestanden = grün + Häkchen + durchgestrichen, nicht bestanden = rot + durchgestrichen)
  if(e.kind==="examDone"){
    const pass=e.result==="pass";
    const col=pass?"#4caf72":"#d94f4f";
    const icon=pass?"✓":"✕";
    const lbl=pass?"bestanden":"nicht bestanden";
    return `<div class="cw-ev exam-done ${pass?'exam-pass':'exam-fail'}" style="border-left-color:${col}" data-evedit="${e.kind}|${e.id}|${e.sid||''}"><span class="cw-evt">${e.pruefTime||e.von} · Prüfung</span><span class="cw-evn"><span class="exd-strike">${esc(firstName(e.name))}</span> <span class="exd-mark" style="color:${col}">${icon} ${lbl}</span></span></div>`;
  }
  const stat=e.status&&e.status!=="geplant"?` <span class="cw-evstat">${e.status}</span>`:"";
  const off=e.status&&e.status!=="geplant";
  const sf=c.sf?`<span class="cw-sf">${sfKuerzel(e)}</span>`:'';
  const examSoon=e.sid&&!!terminFor(e.sid);

function dayUE(iso,doneOnly){
  let ue=0;

// UE über einen Zeitraum: {done, plan, total} (done=absolviert, plan=zukünftig geplant)
function ueRange(fromISO,toISO){
  let done=0, plan=0, fcCounted=0;
  let cur=fromISO, guard=0;
  while(cur<=toISO && guard++<400){
    dayEvents(cur).forEach(e=>{
      if(e.status==="abgebrochen"||e.status==="nicht erschienen")return;
      const ue=ueOf(e.art);
      if(isAbsolved(cur,e.bis))done+=ue; else plan+=ue;
      // FC-abgerechnete UE (zählt fürs Gehalt):
      // Prüfungen immer voll. Fahrstunden NEU: Standard (kein fc-Vermerk) = voll bezahlt (Schüler bringt 2 FC).
      // Ausnahmen werden abgehakt: v1 = nur 1 FC (halbe UE), v2/geschenkt = 0.
      // nachgereicht = wieder voll, wird aber dem AKTUELLEN Monat gutgeschrieben (s.u., nicht hier).
      if(e.kind==="pruefung"){ fcCounted+=ue; }
      else if(["fahrstunde","sonder","nacht"].indexOf(e.art)>=0){
        if(e.fc==="v1")fcCounted+=ue/2;
        else if(e.fc==="v2"||e.fc==="geschenkt")fcCounted+=0;
        else if(e.fc==="nachgereicht")fcCounted+=0; // wird separat dem aktuellen Monat gutgeschrieben
        else fcCounted+=ue; // Standard: voll
      }
    });
    cur=addDays(cur,1);
  }
  // Bereits absolvierte/abgerechnete UE als Sockel – nur für den spezifischen Startmonat
  const su=(DB.verdienst&&DB.verdienst.startUE)||0;
  const startMonth=(DB.verdienst&&DB.verdienst.startMonth)||"2026-06";
  if(su>0){ const [smStart,smEnd]=isoMonthRange(startMonth+"-01"); if(fromISO<=smEnd&&toISO>=smStart){done+=su;fcCounted+=su;} }
  // Nachgereichte FCs: zählen fürs Gehalt im Monat, in dem sie nachgereicht wurden (nachAm), nicht rückwirkend.
  (DB.lessons||[]).forEach(l=>{
    if(l.fc==="nachgereicht"&&l.nachAm){
      const dm=(""+l.nachAm).slice(0,10);
      if(dm>=fromISO&&dm<=toISO){ fcCounted+=ueOf(l.art); }
    }
  });
  // Stattgefundene Prüfungen: 46€ (=2 UE) pro Prüfung, gutgeschrieben am Tag des Eintragens (earnAt).
  // Egal ob bestanden oder nicht. Fallback auf das Prüfungsdatum, falls earnAt fehlt (Altdaten).
  (DB.exams||[]).forEach(ex=>{
    const dm=(""+(ex.earnAt||ex.date||"")).slice(0,10);
    if(dm&&dm>=fromISO&&dm<=toISO){ const u=ueOf("pruefung"); done+=u; fcCounted+=u; }
  });
  return {done,plan,total:done+plan,fcCounted};
}
// Offene FCs (gefahren, nicht abgegeben) in einem Zeitraum
function offeneFCs(fromISO,toISO){

/* ===== Feiertage (Hessen + bundesweit) =====

function easterSunday(year){ // Gauß/Anonymous-Algorithmus -> Ostersonntag

let _holidayCache={};
function holidaysForYear(year){
  if(_holidayCache[year])return _holidayCache[year];
  const map={};
  const add=(d,name)=>{ map[dateISO(d)]=name; };
  // Feste Feiertage
  add(new Date(year,0,1),"Neujahr");

  add(new Date(year,9,3),"Tag der Deutschen Einheit");
  add(new Date(year,11,25),"1. Weihnachtstag");
  add(new Date(year,11,26),"2. Weihnachtstag");

// Erzeugt die regulären Fahrstunden-Blöcke (90 Min) eines Tages laut Arbeitszeit-Konfiguration
function daySlots(iso){
  const cfg=DB.workCfg||{}; const wd=weekdayMon0(iso); const blk=cfg.blockMin||90; const out=[];
  const addRange=(von,bis,art)=>{ let s=hm2min(von), e=hm2min(bis); for(let t=s; t+blk<=e+1; t+=blk){ out.push({von:min2hm(t),bis:min2hm(t+blk),art}); } };
  if(wd<=4){ // Mo–Fr
    if(cfg.vorMittag)addRange(cfg.vorMittag.von,cfg.vorMittag.bis,"fahrstunde");
    if(cfg.nachMittag)addRange(cfg.nachMittag.von,cfg.nachMittag.bis,"fahrstunde");
    if(cfg.nacht&&cfg.nacht.an)addRange(cfg.nacht.von,cfg.nacht.bis,"fahrstunde");
  } else if(wd===5){ // Sa
    if(cfg.samstagAn&&cfg.samstag)addRange(cfg.samstag.von,cfg.samstag.bis,"fahrstunde");
  }

  const pausen=(cfg.pausen||[]).filter(p=>!p.days||!p.days.length||p.days.includes(wd));
