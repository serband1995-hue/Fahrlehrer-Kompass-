function todayISO(){const d=new Date();return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate());}
function isoDE(iso){ if(!iso)return ""; const p=(""+iso).slice(0,10).split("-"); return p.length===3?`${p[2]}.${p[1]}.${p[0].slice(2)}`:iso; }
function activeStudents(){return DB.students.filter(s=>!s.passed);}
// Flexible Namenssuche: jedes eingegebene Wort muss irgendwo im Namen vorkommen (Vor-/Nachname egal)
function matchStudent(name,q){
  if(!q)return true;
  const n=(name||"").toLowerCase();
  const terms=q.toLowerCase().trim().split(/\s+/).filter(Boolean);
  return terms.every(t=>n.includes(t));
}
function inPeriod(iso,p){ if(!iso)return false; if(p==='all')return true; const d=new Date((""+iso).slice(0,10)+"T00:00:00"),now=new Date(); const ym=x=>x.getFullYear()*12+x.getMonth(); const cur=ym(now),t=ym(d); if(p==='cur')return t===cur; if(p==='last')return t===cur-1; if(p==='3')return t<=cur&&t>=cur-2; if(p==='6')return t<=cur&&t>=cur-5; return true; }
const PERIODS=[["cur","Monat"],["last","Vormonat"],["3","3 Mon."],["6","6 Mon."],["all","Gesamt"]];

function waitlist(){ return activeStudents().filter(s=>s.ready).sort((a,b)=>{ const ao=(typeof a.waitOrder==='number')?a.waitOrder:null, bo=(typeof b.waitOrder==='number')?b.waitOrder:null; if(ao!=null&&bo!=null)return ao-bo; if(ao!=null)return -1; if(bo!=null)return 1; const at=a.theoryPassed?Date.parse(a.theoryPassed):Infinity,bt=b.theoryPassed?Date.parse(b.theoryPassed):Infinity; if(at!==bt)return at-bt; return Date.parse(a.ready)-Date.parse(b.ready); }); }
function nextWaitOrder(){ let m=0; activeStudents().forEach(s=>{ if(s.ready&&typeof s.waitOrder==='number'&&s.waitOrder>m)m=s.waitOrder; }); return m+1; }
function setReady(s){ if(!s.ready)s.ready=new Date().toISOString(); }
function bumpBack(s,n){ const wl=waitlist(); const idx=wl.indexOf(s); if(idx<0)return; const rest=wl.filter(x=>x!==s); const pos=Math.min(idx+n,rest.length); rest.splice(pos,0,s); rest.forEach((x,i)=>x.waitOrder=i+1); }
// Durchfaller hinter ALLE setzen, die bereits einen Prüfungstermin haben (aber vor die Termin-losen).
function bumpBehindScheduled(s){
  const wl=waitlist().filter(x=>x!==s);
  const withT=wl.filter(x=>terminFor(x.id));
  const without=wl.filter(x=>!terminFor(x.id));
  const ordered=[...withT,s,...without];
  ordered.forEach((x,i)=>x.waitOrder=i+1);
}
// Prüfungstermine ohne belegte Slots automatisch entfernen (Daten bleiben in exams erhalten).
// Gibt die entfernten Termine zurück (für Undo).
function pruneEmptyTermine(){
  const removed=[];
  DB.termine=(DB.termine||[]).filter(t=>{
    const hasSlot=(t.slots||[]).some(Boolean);
    if(!hasSlot){ removed.push(JSON.parse(JSON.stringify(t))); return false; }
    return true;
  });
  return removed;
}
// Zentrale Ergebnis-Eintragung: setzt earnAt (Verdienst-Timing), entfernt leere Termine,
// schreibt Historie, behandelt bestanden/durchgefallen, bietet Undo.
function commitExamResult(s,opts){
  const id=s.id;
  const date=opts.date||todayISO();
  const attempt=DB.exams.filter(e=>e.sid===id).length+1;
  // Uhrzeit der Prüfung sichern (für die dauerhafte Kalender-Markierung), bevor der Termin entfernt wird
  const _t=terminFor(id);
  const von=opts.von||(_t?_t.von:null)||null;
  const ex={id:uid(),sid:id,name:s.name,date,result:opts.result,pruefer:opts.pruefer||"",note:opts.note||"",attempt,earnAt:todayISO()};
  if(von)ex.von=von;
  if(opts.result==='fail'){ ex.faults=(opts.faults||[]).slice(); ex.eingriff=!!opts.eingriff; ex.eingNote=opts.eingNote||""; }
  else { ex.faults=[]; ex.eingriff=false; }
  // Snapshot für Undo
  const snap={ exLen:DB.exams.length, termine:JSON.parse(JSON.stringify(DB.termine||[])),
    passed:s.passed, ready:s.ready, waitOrder:s.waitOrder, attempts:s.attempts, histLen:Array.isArray(s.hist)?s.hist.length:0 };
  DB.exams.push(ex);
  clearSlot(id);
  pruneEmptyTermine();
  const eur=Math.round(ueOf("pruefung")*DB.verdienst.proUE);
  if(opts.result==='pass'){
    s.passed=date; delete s.ready; delete s.waitOrder;
    logHist(s,"pruefung",`Praktische Prüfung bestanden${opts.pruefer?` · ${opts.pruefer}`:""}`,{eur});
    save();
    toastUndo("Bestanden – ins Archiv ✓",()=>undoExam(s,snap,()=>routePruefungen()));
    celebrate(); routeArchive();
  } else {
    s.attempts=(s.attempts||0)+1;
    bumpBehindScheduled(s);
    const grund=(opts.faults&&opts.faults.length)?opts.faults.map(f=>FAULT_LABEL[f]||f).slice(0,2).join(", "):(opts.eingriff?"Eingriff":"");
    logHist(s,"pruefung",`Praktische Prüfung nicht bestanden${opts.pruefer?` · ${opts.pruefer}`:""}${grund?` · ${grund}`:""}`,{eur});
    save();
    toastUndo("Eingetragen · zurück in Warteliste",()=>undoExam(s,snap,()=>routePruefungen()));
    routePruefungen();
  }
}
function undoExam(s,snap,after){
  DB.exams.length=snap.exLen;            // letzten Prüfungseintrag entfernen
  DB.termine=snap.termine;                // Termine (inkl. evtl. entfernter) wiederherstellen
  if(snap.passed)s.passed=snap.passed; else delete s.passed;
  if(snap.ready)s.ready=snap.ready; else delete s.ready;
  if(typeof snap.waitOrder==='number')s.waitOrder=snap.waitOrder; else delete s.waitOrder;
  if(typeof snap.attempts==='number')s.attempts=snap.attempts; else delete s.attempts;
  if(Array.isArray(s.hist))s.hist.length=snap.histLen;
  save(); if(after)after();
}

function futureTermine(){ const t=todayISO(); return DB.termine.filter(x=>x.date>=t).sort((a,b)=>a.date<b.date?-1:1); }
function terminFor(sid){ for(const t of futureTermine()){ if(t.slots&&t.slots.indexOf(sid)>=0)return t; } return null; }
function assignedSet(){ const set=new Set(); futureTermine().forEach(t=>(t.slots||[]).forEach(x=>{if(x)set.add(x);})); return set; }
function createTermin(date,plaetze,von){ const taken=assignedSet(); const avail=waitlist().filter(s=>!taken.has(s.id)&&examReadiness(s).ready); const slots=[]; for(let i=0;i<plaetze;i++)slots.push(avail[i]?avail[i].id:null); const t={id:uid(),date,plaetze,slots}; if(von){ t.von=von; t.bis=min2hm(hm2min(von)+(DB.workCfg.blockMin||90)); } DB.termine.push(t); save(); return t; }
function clearSlot(sid){ DB.termine.forEach(t=>{ if(t.slots)t.slots=t.slots.map(x=>x===sid?null:x); }); }
function nextTermin(){ for(const t of futureTermine()){ const names=(t.slots||[]).filter(Boolean).map(id=>{const st=DB.students.find(x=>x.id===id);return st?st.name:null;}).filter(Boolean); if(names.length)return {date:t.date,names}; } return null; }

function examsIn(p){ return DB.exams.filter(e=>inPeriod(e.date,p)); }
function quoteOf(ex){ const pass=ex.filter(e=>e.result==='pass').length; const total=ex.length; return {pass,total,pct: total?Math.round(pass/total*100):null}; }
function firstAttemptQuote(ex){ return quoteOf(ex.filter(e=>e.attempt===1)); }
function avgAttempts(ex){ const p=ex.filter(e=>e.result==='pass'); if(!p.length)return null; return Math.round(p.reduce((a,e)=>a+(e.attempt||1),0)/p.length*10)/10; }
function eingriffQuote(ex){ const f=ex.filter(e=>e.result==='fail'); if(!f.length)return null; return Math.round(f.filter(e=>e.eingriff).length/f.length*100); }
function faultCounts(ex){ const c={}; ex.filter(e=>e.result==='fail').forEach(e=>(e.faults||[]).forEach(f=>{c[f]=(c[f]||0)+1;})); return Object.entries(c).sort((a,b)=>b[1]-a[1]); }

      faults:_examFaults, eingriff:_examEingriff, eingNote:en?en.value.trim():"" });
  });
}

// Schüler mit bestandener Theorie, aber <90% (noch nicht bereit)
function theorieBestanden(){ return activeStudents().filter(s=>s.theoryPassed&&stand(s)<90).sort((a,b)=>stand(b)-stand(a)); }
// Pausiert: wartet auf die Theorieprüfung, keine Fahrstunden bis dahin
function theorieAusstehend(){ return activeStudents().filter(s=>s.theorieWait&&!s.theoryPassed).sort((a,b)=>Date.parse(a.theorieWait)-Date.parse(b.theorieWait)); }
// Theorie bestanden UND >=90% (bereit für Praxis)
function bereitFuerPraxis(){ return activeStudents().filter(s=>s.theoryPassed&&stand(s)>=90).sort((a,b)=>a.name.localeCompare(b.name,'de')); }

function syncTheoriePraxis(){ let dirty=false; activeStudents().forEach(s=>{ if(s.theoryPassed&&stand(s)>=90&&!s.ready){ s.ready=new Date().toISOString(); dirty=true; } }); if(dirty)save(); }

/* ---------- Dashboard ---------- */
/* ===== Fahrcheck-System (FC) — NEU =====
   Logik: Standard = Schüler bringt 2 FC pro Fahrstunde -> automatisch voll, KEINE Bestätigung nötig.
   Nur Ausnahmen werden vermerkt:
     l.fc = "v1"          -> 1 FC vergessen (nur 1×23€)
     l.fc = "v2"          -> 2 FC vergessen (0€)
     l.fc = "geschenkt"   -> bewusst geschenkt (0€)
     l.fc = "nachgereicht"-> später nachgebracht (wieder voll, zählt im Monat von l.nachAm)
   Kein Vermerk (null/undefined) = Normalfall, voll bezahlt. */

// Fahrstunden-Lesson finden
function fcLesson(id){ return (DB.lessons||[]).find(x=>x.id===id); }
// Lessons mit offenem Verlust (v1/v2) – für Übersicht "FC vergessen"
function fcForgottenLessons(){
  return (DB.lessons||[]).filter(l=>l.fc==="v1"||l.fc==="v2").sort((a,b)=>(""+b.date).localeCompare(""+a.date));
}
// entgangenes Geld gesamt (offene v1/v2, noch nicht nachgereicht)
function fcForgottenEuro(){ let ue=0; fcForgottenLessons().forEach(l=>{ ue += (l.fc==="v1")? ueOf(l.art)/2 : ueOf(l.art); }); return Math.round(ue*DB.verdienst.proUE); }
function eurFmt(n){ return (Math.round(n)).toLocaleString("de-DE")+" €"; }

// Dashboard-Karte: zeigt NUR offene Ausnahmen (vergessene FC). Kein Bestätigen mehr im Normalfall.
function fcPendingCardHTML(){
  const forg=fcForgottenLessons();
  if(!forg.length)return "";
  const eur=fcForgottenEuro();
  let h=`<div class="fc-card">`;
  h+=`<button class="fc-missing-link" id="fcMissingLink"><span>FC vergessen: <b>${forg.length}</b></span><span class="fc-missing-eur">${eurFmt(eur)} offen ›</span></button>`;
  h+=`</div>`; return h;
}
function bindFC(){
  const ml=$("#fcMissingLink"); if(ml)ml.addEventListener("click",routeFCMissing);
}

// Zentrale Funktion: FC-Status einer Fahrstunde setzen (mit Historie + Undo)
function setFC(id,status){
  const l=fcLesson(id); if(!l)return;
  const st=DB.students.find(s=>s.id===l.sid);
  const prev=l.fc||null; const prevNachAm=l.nachAm||null;
  const ueFull=ueOf(l.art); const eurFull=Math.round(ueFull*DB.verdienst.proUE);
  let msg="", histTxt="", eurDelta=0;
  if(status==="v1"){ l.fc="v1"; delete l.nachAm; msg="1 FC vergessen vermerkt"; histTxt="1 Fahrcheck vergessen"; eurDelta=-Math.round(ueFull/2*DB.verdienst.proUE); }
  else if(status==="v2"){ l.fc="v2"; delete l.nachAm; msg="2 FC vergessen vermerkt"; histTxt="2 Fahrchecks vergessen"; eurDelta=-eurFull; }
  else if(status==="geschenkt"){ l.fc="geschenkt"; delete l.nachAm; msg="45 Min geschenkt"; histTxt="Fahrstunde geschenkt"; eurDelta=-eurFull; }
  else if(status==="nachgereicht"){ l.fc="nachgereicht"; l.nachAm=new Date().toISOString(); msg="FC nachgereicht – Verdienst gutgeschrieben"; histTxt="FC nachgereicht"; const back=(prev==="v1")?Math.round(ueFull/2*DB.verdienst.proUE):eurFull; eurDelta=back; }
  else if(status==="normal"){ delete l.fc; delete l.nachAm; msg="Auf Normal gesetzt"; histTxt="FC auf Normal gesetzt"; }
  if(st&&histTxt)logHist(st,"fc",histTxt+(l.date?` · ${isoDE(l.date)}`:""),eurDelta?{eur:eurDelta}:null);
  save();
  toastUndo(msg,()=>{ if(prev===null)delete l.fc; else l.fc=prev; if(prevNachAm)l.nachAm=prevNachAm; else delete l.nachAm;
    if(st&&Array.isArray(st.hist))st.hist.pop(); save(); if($("#view"))refreshCurrentView(); });
  refreshCurrentView();
}

// Sheet zum Vermerken einer Ausnahme – wird im Kalender/Termin und in der Vergessen-Liste genutzt
function openFCMenu(id){
  const l=fcLesson(id); if(!l)return;
  const st=DB.students.find(s=>s.id===l.sid);
  const cur=l.fc||null;
  const tag=(v,lab,sub,cls)=>`<button class="es-act${cls?(' '+cls):''}${cur===v?' on':''}" data-fcset="${v}">${lab}${sub?`<span style="display:block;font-size:12px;opacity:.7;font-weight:600;margin-top:2px;">${sub}</span>`:""}</button>`;
  let acts="";
  acts+=tag("normal","Normal · 2 FC erhalten","voller Verdienst","primary");
  acts+=tag("v1","1 FC vergessen","nur 1 × "+DB.verdienst.proUE+" €");
  acts+=tag("v2","2 FC vergessen","0 €");
  acts+=tag("geschenkt","45 Min geschenkt","0 €");
  if(cur==="v1"||cur==="v2"){ acts+=tag("nachgereicht","FC nachgereicht","Verdienst kommt zurück (akt. Monat)","good"); }
  acts+=`<button class="es-act danger" data-fcdel="${id}">Hat nicht stattgefunden (löschen)</button>`;
  openSheet(`<div class="sheet-h">Fahrcheck · ${esc(st?st.name:"")}</div>
    <p class="muted-p" style="font-size:13px;margin:-4px 0 14px;">${isoDE(l.date)} · ${l.von} · ${(CAL_ARTEN[l.art]||CAL_ARTEN.fahrstunde).lab}</p>
    <p class="muted-p" style="font-size:12.5px;margin:-6px 0 14px;color:var(--faint);">Standard ist „2 FC erhalten“ – hier nur Ausnahmen vermerken.</p>
    <div class="es-actions">${acts}</div>`);
  document.querySelectorAll("[data-fcset]").forEach(b=>b.addEventListener("click",()=>{ closeSheet(); setFC(id,b.dataset.fcset); }));
  document.querySelectorAll("[data-fcdel]").forEach(b=>b.addEventListener("click",()=>{ const sid=l.sid; deleteLesson(b.dataset.fcdel); if(sid)logHist(sid,"del","Fahrstunde gelöscht (nicht stattgefunden)"); save(); closeSheet(); toast("Termin gelöscht"); refreshCurrentView(); }));
}

/* Übersicht „FC vergessen“ – welche Schüler, wie oft, wie viel Geld entgeht */
function routeFCMissing(){
  ensureDB(); $("#tbTitle").textContent="FC vergessen"; setFab(false); view.scrollTop=0;
  const forg=fcForgottenLessons(); const eur=fcForgottenEuro();
  // Gruppieren pro Schüler
  const byStud={};
  forg.forEach(l=>{ const k=l.sid||"?"; if(!byStud[k])byStud[k]={sid:l.sid,lessons:[],ue:0}; byStud[k].lessons.push(l); byStud[k].ue += (l.fc==="v1")?ueOf(l.art)/2:ueOf(l.art); });
  const groups=Object.values(byStud).sort((a,b)=>b.ue-a.ue);
  let h=`<div class="view-inner view-read fade-up">
    <div class="back-row"><button class="back-btn" id="backBtn">${ICN.back} Start</button></div>
    <div class="sec-h" style="margin:4px 0 4px;">FC <span class="o">vergessen</span></div>
    <p class="muted-p" style="font-size:13.5px;margin-bottom:14px;">Wenn ein Schüler einen oder beide Fahrchecks nicht dabei hatte. Sobald nachgereicht, fließt der Verdienst im aktuellen Monat nach.</p>
    <div class="fc-miss-sum">Aktuell entgehen dir <b>${eurFmt(eur)}</b> durch ${forg.length} vergessene${forg.length===1?'n':''} Fahrcheck${forg.length===1?'':'s'}.</div>`;
  if(!groups.length)h+=`<p class="muted-p" style="text-align:center;padding:20px;">Niemand hat aktuell FC vergessen 🎉</p>`;
  else groups.forEach(g=>{ const st=DB.students.find(s=>s.id===g.sid); const cnt=g.lessons.length; const euro=Math.round(g.ue*DB.verdienst.proUE);
    h+=`<div class="fc-grp"><div class="fc-grp-head"><div class="fc-nm">${esc(st?st.name:"—")}</div><div class="fc-grp-eur">−${eurFmt(euro)} · ${cnt}×</div></div>`;
    g.lessons.forEach(l=>{ h+=`<div class="fc-miss-row">
        <div class="fc-info"><div class="fc-meta">${isoDE(l.date)} · ${l.von} · ${l.fc==="v1"?"1 FC fehlt":"2 FC fehlen"}</div></div>
        <button class="fc-yes" data-fcnach="${l.id}">Nachgereicht</button>
        <button class="fc-more" data-fcmore2="${l.id}" aria-label="Optionen">⋯</button>
      </div>`; });
    h+=`</div>`; });
  h+=`</div>`; view.innerHTML=h;
  $("#backBtn").addEventListener("click",routeDashboard);
  document.querySelectorAll("[data-fcnach]").forEach(b=>b.addEventListener("click",()=>setFC(b.dataset.fcnach,"nachgereicht")));
  document.querySelectorAll("[data-fcmore2]").forEach(b=>b.addEventListener("click",()=>openFCMenu(b.dataset.fcmore2)));
}

// Hilfsfunktion: aktuelle Ansicht neu zeichnen (für Undo/Refresh nach FC-Aktion)
function refreshCurrentView(){
  const tb=($("#tbTitle")&&$("#tbTitle").textContent)||"";
  if(tb==="FC vergessen")return routeFCMissing();
  if(tb==="Kalender")return (typeof routeKalender==="function")?routeKalender():routeDashboard();
  if(tb==="Schülerdatei")return; // Detailseite aktualisiert sich beim nächsten Öffnen
  return routeDashboard();
}

/* ===== Kapazitäts-Rechnung =====
   Wöchentliche Slot-Kapazität vs. aktiver Fahrbedarf.
   Aktiv = in Ausbildung, fährt regelmäßig. Ausgenommen: Theorie-Wartende (fahren nicht),
   prüfungsreife/Warteliste (fahren kaum), Dummys, Schüler unter 1% Fortschritt. */
function isDummyStudent(s){
  const n=(s.name||"").toLowerCase().trim();
  if(!n)return true;
  return n==="test"||n.includes("serband test")||n==="serband"||n==="dummy"||n.startsWith("test ")||n.endsWith(" test");
}
function capacityStats(){
  // Wochen-Slot-Kapazität aus Arbeitszeit ableiten (Fallback: 6/Tag Mo-Fr + 2 Sa = 32)
  const slotsPerWeek=(typeof DB.workCfg.kapazitaetWoche==="number"&&DB.workCfg.kapazitaetWoche>0)?DB.workCfg.kapazitaetWoche:32;
  const avgPerStudent=1.5; // Schnitt 1-2× pro Woche
  // Aktiv fahrende Schüler: nicht passed, kein Theorie-Wait, nicht prüfungsreif/Warteliste, >=1%, kein Dummy
  const fahrend=DB.students.filter(s=>{
    if(s.passed)return false;
    if(isDummyStudent(s))return false;
    if(s.theorieWait&&!s.theoryPassed)return false; // wartet auf Theorie
    if(s.ready)return false;                          // prüfungsreif/Warteliste → fährt kaum noch
    if(stand(s)<1)return false;                       // unter 1% (gerade erst angelegt)
    return true;
  });
  const bedarf=Math.round(fahrend.length*avgPerStudent);
  const auslastung=slotsPerWeek>0?Math.round(bedarf/slotsPerWeek*100):0;
  // Wie viele Neue noch? Ein neuer Schüler braucht anfangs ~2 Slots/Woche
  const freieSlots=Math.max(0,slotsPerWeek-bedarf);
  const platzNeu=Math.floor(freieSlots/2);
  let ampel="gruen", text="";
  if(auslastung>=100){ ampel="rot"; text="Voll ausgelastet – aktuell keine neuen Schüler aufnehmen."; }
  else if(auslastung>=85){ ampel="gelb"; text=`Fast voll – höchstens ${platzNeu} neue${platzNeu===1?'r':''} Schüler möglich.`; }
  else { ampel="gruen"; text=`Du hast Luft für ca. ${platzNeu} neue Schüler.`; }
  return {slotsPerWeek,fahrend:fahrend.length,bedarf,auslastung,platzNeu,ampel,text};
}

  const c=capacityStats();
  const col={gruen:"#4caf72",gelb:"#e0a44a",rot:"#d94f4f"}[c.ampel];

  return `<button class="cap-card" id="capCard">
    <div class="cap-head"><span class="cap-title">Auslastung</span><span class="cap-pct" style="color:${col}">${c.auslastung}%</span></div>

}

function verdienstModulHTML(){
  const v=DB.verdienst; const today=todayISO();
  const [moStart,moEnd]=monthRangeOf(today);
  const moUE=ueRange(moStart,moEnd);
  const verdientUE=moUE.fcCounted;
  const geplantUE=Math.max(0,moUE.total-moUE.done); // zukünftig
  const verdientEuro=gehaltAusUE(verdientUE);
  const vorausEuro=gehaltAusUE(verdientUE+geplantUE);
  const offenUE=Math.max(0,moUE.done-verdientUE);
  const MAX=300;
  // Thermometer-Füllung: nur verdiente UE
  const TUBE=200; // px
  const toH=(ue)=>Math.round(Math.max(0,Math.min(ue,MAX))/MAX*TUBE);
  const gruenH=toH(Math.min(verdientUE,140));
  const orangeH=verdientUE>140?toH(Math.min(verdientUE,250))-toH(140):0;
  const goldH=verdientUE>250?toH(Math.min(verdientUE,MAX))-toH(250):0;
  // Skalenmarken
  const marks=[0,70,140,200,250,300];
  const curPos=Math.round(Math.min(verdientUE,MAX)/MAX*TUBE);
  const marksHTML=marks.map(ue=>{
    const bot=Math.round(ue/MAX*TUBE)+26; // +26 für Base-Höhe
    const isCur=ue>0&&Math.abs(ue-verdientUE)<15&&ue!==0&&ue!==300;
    const cls=ue===250?'t-bonus':ue===300?'t-gold':'';
    return `<div class="th-mark ${isCur?'t-cur':cls}" style="bottom:${bot}px"><div class="th-tick"></div><div class="th-val">${ue} UE</div></div>`;
  }).join('');
  // Aktuell-Marker
  const curBot=curPos+26;
  const curMarker=`<div class="th-mark t-cur" style="bottom:${curBot}px"><div class="th-tick"></div><div class="th-val">${Math.round(verdientUE)} UE ◄</div></div>`;
  // Bis-250 Zeile — beantwortet: wie viele NEUE Termine noch legen?
  const restUE=Math.max(0,250-Math.round(verdientUE)-Math.round(geplantUE)); // noch zu legen
  const bonusJetzt=verdientUE>=250;
  const bonusMitPlan=(verdientUE+geplantUE)>=250;
  let bisHtml;
  if(bonusJetzt){
    bisHtml=`<div class="th-goal" style="border-color:rgba(207,154,62,.4);background:rgba(207,154,62,.1);"><div class="thg-lab">🥇 Bonus erreicht!</div><div class="thg-val" style="color:#cf9a3e;">+${eur(v.bonus)} dabei</div></div>`;

  }else{
    bisHtml=`<div class="th-goal"><div class="thg-lab">Für den Bonus noch zu legen</div><div class="thg-val">${restUE} UE · ~${Math.ceil(restUE/2)} Fahrstd.</div></div>`;
  }
  return `<div class="vd-card">
    <div class="vd-head"><div class="vd-title">Verdienst · ${deMonth(parseISO(today).getMonth())}</div><button class="vd-gear" id="vdGear" aria-label="Einstellungen">${ICN.gear||"⚙"}</button></div>
    <div class="thermo-wrap">
      <div class="thermo-left">
        <div class="thermo-tube">

          <div class="th-seg th-orange" data-th="${orangeH}" style="flex-basis:0px"></div>

        </div>

      <div class="thi-card future"><div class="thi-k">📅 Voraussichtlich</div><div class="thi-v">${eur(vorausEuro)}</div><div class="thi-s">inkl. ${Math.round(geplantUE)} UE geplant</div></div>

    ${offenUE>0.3?`<div class="vd-offen">⚠ ${fmtUE(offenUE)} UE gefahren, FC noch offen · <b>${eur(leistungAusUE(offenUE))}</b> stehen aus</div>`:''}
    ${bisHtml}
  </div>`;
}

function routeNichtBesteher(period){
  ensureDB(); period=period||'cur';
  $("#tbTitle").textContent="Nicht-Besteher"; setFab(false); view.scrollTop=0;
  const fails=examsIn(period).filter(e=>e.result==='fail').sort((a,b)=>(""+b.date).localeCompare(""+a.date));
  // Gruppierung pro Prüfer für Auswertung
  const byPr={};
  fails.forEach(e=>{ const k=e.pruefer||"—"; if(!byPr[k])byPr[k]={pruefer:k,fails:[],faultCnt:{}}; byPr[k].fails.push(e); (e.faults||[]).forEach(f=>{byPr[k].faultCnt[f]=(byPr[k].faultCnt[f]||0)+1;}); });
  const prGroups=Object.values(byPr).sort((a,b)=>b.fails.length-a.fails.length);
  let h=`<div class="view-inner view-read fade-up">
    <div class="back-row"><button class="back-btn" id="backBtn">${ICN.back} Statistik</button></div>
    <div class="sec-h" style="margin:4px 0 10px;">Nicht-<span class="o">Besteher</span></div>
    ${periodChips(period)}
    <p class="muted-p" style="font-size:13px;margin:12px 0 16px;">Wer wann bei welchem Prüfer und aus welchem Grund nicht bestanden hat – rein zur Auswertung.</p>`;
  if(!fails.length){
    h+=`<p class="muted-p" style="text-align:center;padding:24px 0;">Keine Nicht-Besteher in diesem Zeitraum 🎉</p>`;
  } else {
    // Auswertung pro Prüfer
    h+=`<div class="blk-h">Pro Prüfer</div>`;
    prGroups.forEach(g=>{
      const topFaults=Object.entries(g.faultCnt).sort((a,b)=>b[1]-a[1]).slice(0,2).map(([fid,n])=>`${FAULT_LABEL[fid]||fid} (${n}×)`).join(", ");
      h+=`<div class="fc-grp"><div class="fc-grp-head"><div class="fc-nm">${esc(g.pruefer)}</div><div class="fc-grp-eur" style="color:var(--muted)">${g.fails.length}× durchgefallen</div></div>
        ${topFaults?`<div class="muted-p" style="font-size:12.5px;padding:6px 0 2px;">Häufig: ${esc(topFaults)}</div>`:""}</div>`;
    });
    // Einzelliste
    h+=`<div class="blk-h" style="margin-top:18px;">Alle Einträge</div>`;
    fails.forEach(e=>{
      const st=DB.students.find(x=>x.id===e.sid);
      const grund=(e.faults&&e.faults.length)?e.faults.map(f=>FAULT_LABEL[f]||f).join(", "):(e.eingriff?"Eingriff des Fahrlehrers":"—");
      h+=`<div class="nb-row" data-sid="${e.sid}">
        <div class="nb-top"><span class="nb-name">${esc(st?st.name:e.name||"—")}</span><span class="nb-date">${isoDE(e.date)}</span></div>
        <div class="nb-meta">${e.pruefer?`Prüfer: ${esc(e.pruefer)} · `:""}${e.attempt?`${e.attempt}. Versuch`:""}</div>
        <div class="nb-grund">${esc(grund)}</div>
        ${e.eingNote?`<div class="nb-note">${esc(e.eingNote)}</div>`:""}
      </div>`;
    });
  }
  h+=`</div>`; view.innerHTML=h;
  $("#backBtn").addEventListener("click",()=>routeStats(period));
  bindPeriod(routeNichtBesteher);
  document.querySelectorAll(".nb-row[data-sid]").forEach(r=>r.addEventListener("click",()=>{ const sid=r.dataset.sid; if(sid)routeDetail(sid); }));
}

function mergePruefer(alt,neu){
  ensureDB();
  const exists=DB.prueferData[neu]||DB.pruefer.includes(neu);
  // Alle Prüfungen umhängen
  DB.exams.forEach(e=>{ if(e.pruefer===alt)e.pruefer=neu; });
  // B197-Schaltkompetenz-Einträge umhängen (falls vorhanden)
  (DB.students||[]).forEach(s=>{ if(s.b197pruefer===alt)s.b197pruefer=neu; });
  if(exists){
    // Zusammenführen: Akte-Daten vereinen
    const a=DB.prueferData[alt]||{tags:[],routen:[],notiz:""};
    const b=ensurePruefer(neu);
    (a.tags||[]).forEach(t=>{ if(!b.tags.includes(t))b.tags.push(t); });
    (a.routen||[]).forEach(r=>b.routen.push(r));
    if(a.notiz&&!b.notiz)b.notiz=a.notiz; else if(a.notiz&&b.notiz&&!b.notiz.includes(a.notiz))b.notiz=b.notiz+"\n"+a.notiz;
    delete DB.prueferData[alt];
    DB.pruefer=DB.pruefer.filter(x=>x!==alt);
    save(); toast("Zusammengeführt ✓"); routePrueferAkte(neu);
  } else {
    // Reines Umbenennen
    DB.prueferData[neu]=DB.prueferData[alt]||{behoerde:"",tags:[],routen:[],notiz:"",created:Date.now()};
    delete DB.prueferData[alt];
    DB.pruefer=DB.pruefer.filter(x=>x!==alt); if(!DB.pruefer.includes(neu))DB.pruefer.push(neu);
    DB.pruefer.sort((a,b)=>a.localeCompare(b,'de'));
    save(); toast("Umbenannt ✓"); routePrueferAkte(neu);
  }
}

function printPlan(s){
  ensure(s);
  const pl=s.plan; const pct=planProgress(pl);
  const std=[]; for(let i=1;i<=30;i++){ if(pl.stunden[i])std.push(`${pad2(i)}. ${esc(pl.stunden[i].d)}${pl.fahrcheck[i]?" (FC)":""}`); }
  const sonder=SONDER_DEF.map(sd=>{ const arr=pl.sonder[sd.key]||[]; return `${sd.label}: ${sfCount(arr)}/${sd.soll}`; }).join(" · ");
  const VL={rot:"Rot",gelb:"Gelb",gruen:"Grün"};
  const stufenHtml=STUFEN.map(st=>{
    const rows=st.items.map(it=>{ const v=pl.ampeln[it.id]; const lab=v?VL[v]:"–"; return `<tr><td>${esc(it.t)}${it.ort?` <span class="pr-ort">(${esc(it.ort)})</span>`:""}</td><td class="pr-${v||"none"}">${lab}</td></tr>`; }).join("");
    const done=st.items.filter(it=>pl.ampeln[it.id]==="gruen").length;
    const note=pl.notes[st.key]?`<div class="pr-note"><b>Notiz:</b> ${esc(pl.notes[st.key])}</div>`:"";
    return `<div class="pr-sec"><h3><span>${st.nr} · ${esc(st.titel)}</span><span class="pr-cnt">${done}/${st.items.length} grün</span></h3><table class="pr-tbl"><tbody>${rows}</tbody></table>${note}</div>`;
  }).join("");
  const body=`
    <div class="pr-meta"><b>${esc(s.name)}</b> · Klasse ${esc(s.form||"B")}${s.beginn?` · Beginn ${esc(s.beginn)}`:""}</div>
    <div class="pr-prog">Ausbildungsstand: <b>${pct} %</b> · Theorie: <b>${pl.theorie?"bestanden":"offen"}</b>${s.simEmpf?` · Simulator empfohlen am ${isoDE(s.simEmpf)}`:""}</div>
    <div class="pr-sec"><h3><span>Fahrstunden</span><span class="pr-cnt">${std.length}/30</span></h3><div class="pr-list">${std.length?std.join(" · "):"—"}</div><div class="pr-sub">${sonder}</div></div>
    ${stufenHtml}`;
  printDoc("Ausbildungsplan",body);
}
function printBogen(s){
  if(!s.bogen){toast("Noch kein Profil vorhanden");return;}
  const E=evalBogen(s.bogen);
  const summary=esc(buildSummary(s,E)).replace(/\n/g,"<br>");
  const headline=E.pure?`${PROFILE[E.top].word} – ${COLOR_INFO[E.top].label}`:`${PROFILE[E.top].word}-${PROFILE[E.second].word} · ${E.blend.label}`;
  const cp=s.bogen.colorPct;
  const order=["rot","gelb","gruen","blau"].sort((a,b)=>(cp[b]||0)-(cp[a]||0));
  const bars=order.map(c=>`<div class="pr-bar"><span>${PROFILE[c].word}</span><span class="pr-bv">${cp[c]||0} %</span></div><div style="background:#eee;border-radius:5px;height:8px;margin:2px 0 8px;overflow:hidden;"><div style="height:100%;width:${Math.max(0,Math.min(100,cp[c]||0))}%;background:${PROFILE[c].hex};border-radius:5px;"></div></div>`).join("");
  // Lerntyp-Verteilung (echte Daten aus lernPct) als Balken
  let lernSection="";
  if(s.bogen.lernPct){
    const lp=s.bogen.lernPct;
    const LERN_LAB={visuell:"Visuell (sehen/zeigen)",auditiv:"Auditiv (erklären/hören)",praktisch:"Praktisch (selbst tun)"};
    const lorder=["visuell","auditiv","praktisch"].sort((a,b)=>(lp[b]||0)-(lp[a]||0));
    const lbars=lorder.map(k=>{
      const val=Math.max(0,Math.min(100,lp[k]||0));
      return `<div class="pr-bar"><span>${LERN_LAB[k]}</span><span class="pr-bv">${lp[k]||0} %</span></div><div style="background:#eee;border-radius:5px;height:8px;margin:2px 0 8px;overflow:hidden;"><div style="height:100%;width:${val}%;background:#5a8ec4;border-radius:5px;"></div></div>`;
    }).join("");
    const tempoTxt=(lp.tempo>=60)?"Braucht viele Wiederholungen, kleine Schritte":(lp.tempo<=35?"Lernt zügig, große Schritte möglich":"Normales Lerntempo");
    lernSection=`<div class="pr-sec" style="margin-top:14px;"><h3><span>Lerntyp</span></h3>${lbars}<div class="pr-sub" style="margin-top:6px;"><b>Lerntempo:</b> ${tempoTxt}</div></div>`;
  }
  const body=`
    <div class="pr-meta"><b>${esc(s.name)}</b> · ${esc(headline)}</div>
    <div class="pr-sec"><h3><span>Farbverteilung</span></h3>${bars}</div>
    ${lernSection}
    <div class="pr-sec"><h3><span>Auswertung</span></h3><div class="pr-summary">${summary}</div></div>`;
  printDoc("Persönlichkeitsprofil",body);
}

const RISK_LABEL={offen:"Offen",unsicher:"Unsicher",sicher:"Sicher"};
function riskStatus(s,id){ return (s.risk&&s.risk[id])||"offen"; }
function daysSince(iso){ if(!iso)return 0; const s=(""+iso).slice(0,10); const d=new Date(s+"T00:00:00"); if(isNaN(d.getTime()))return 0; const n=new Date(); n.setHours(0,0,0,0); return Math.max(0,Math.round((n-d)/86400000)); }

/* Prüfungs-Freigabe (Poka-Yoke-Checkliste vor dem kritischen Moment) */
function examReadiness(s){
  ensure(s);
  const pct=stand(s);
  const skillOpen=EVAL_SKILLS.filter(id=>(s.plan.ampeln[id]||null)!=="gruen").length;
  let sonderDone=0,sonderTot=0;
  SONDER_DEF.forEach(d=>{ sonderTot+=d.soll; sonderDone+=Math.min(sfCount(s.plan.sonder[d.key]),d.soll); });
  const sonderOk=sonderDone>=sonderTot, theoOk=!!s.plan.theorie;
  const riskOpenList=RISK_THEMES.filter(t=>riskStatus(s,t.id)!=="sicher");
  const riskOk=riskOpenList.length===0, skillOk=pct>=READY_MIN;
  const items=[
    {label:`Ausbildungsstand ${pct} % (Ziel ≥ ${READY_MIN} %)`, ok:skillOk, detail:skillOk?null:`Noch ${skillOpen} ${skillOpen===1?"Thema":"Themen"} nicht auf Grün.`},
    {label:`Sonderfahrten ${sonderDone}/${sonderTot}`, ok:sonderOk, detail:sonderOk?null:"Pflichtfahrten noch nicht komplett."},
    {label:"Theorieprüfung bestanden", ok:theoOk, detail:theoOk?null:"Im Ausbildungsplan noch nicht abgehakt."},
    {label:`Risiko-Themen sicher (${RISK_THEMES.length-riskOpenList.length}/${RISK_THEMES.length})`, ok:riskOk, detail:riskOk?null:`Noch offen: ${riskOpenList.slice(0,3).map(t=>t.t).join(", ")}${riskOpenList.length>3?" …":""}`}
  ];
  if(s.attempts>0){
    const fset=new Set();
    (DB.exams||[]).forEach(e=>{ if(e.sid===s.id&&e.result==="fail"&&Array.isArray(e.faults)) e.faults.forEach(fc=>fset.add(FAULT_LABEL[fc]||fc)); });
    if(fset.size) items.push({label:"Aus früherem Versuch beachten", ok:null, detail:[...fset].slice(0,4).join(", ")});
  }
  const ready=skillOk&&sonderOk&&theoOk&&riskOk;
  return {ready, items, openCount:items.filter(it=>it.ok===false).length, skillOpen, riskOpen:riskOpenList.length};
}

function freigabeCard(s){
  const R=examReadiness(s);
  const rows=R.items.map(it=>{
    const cls=it.ok===true?"fc-ok":it.ok===false?"fc-no":"fc-info";
    const mk=it.ok===true?"✓":it.ok===false?"✗":"ℹ";
    return `<div class="fcheck-row ${cls}"><span class="fcheck-mark">${mk}</span><div class="fcheck-body"><div class="fcheck-lab">${it.label}</div>${it.detail?`<div class="fcheck-det">${it.detail}</div>`:""}</div></div>`;
  }).join("");
  const head=R.ready
    ? `<div class="rc-name">Bereit für die Prüfung ✓</div><div class="rc-sub">Alle Punkte sitzen – jetzt kannst du ihn melden.</div>`
    : `<div class="rc-name">Freigabe-Check</div><div class="rc-sub">Noch ${R.openCount} ${R.openCount===1?"Punkt":"Punkte"} offen, bevor er bereit ist.</div>`;
  const btn=R.ready
    ? `<button class="btn btn-primary" id="readyOn" style="width:100%;margin-top:6px;">Prüfungsreif melden</button>`
    : `<button class="btn" id="readyLk" style="width:100%;margin-top:6px;background:var(--surface-2);color:var(--faint);box-shadow:none;cursor:not-allowed;" disabled>Erst alle Punkte erfüllen</button>`+`<button class="btn btn-ghost" id="readyForce" style="width:100%;margin-top:8px;">Trotzdem manuell melden</button>`;
  return `<div class="ready-card${R.ready?"":" check"}">
    <div class="ready-head"><div class="rc-ic"${R.ready?"":' style="background:var(--surface-2);color:var(--faint)"'}>${ICN.trophy}</div>
      <div class="rc-body">${head}</div></div>
    <div class="fcheck-list">${rows}</div>
    <button class="fcheck-edit" id="riskEditBtn">Risiko-Themen durchgehen ${ICN.arrow}</button>
    ${btn}
  </div>`;
}

function lagebildCard(s){
  const E=s.bogen?evalBogen(s.bogen):null;
  const amp=s.plan.ampeln||{};
  const reds=[],yellows=[],greens=[];
  STUFEN.forEach(st=>st.items.forEach(it=>{const v=amp[it.id];if(v==="gruen")greens.push(it.t);else if(v==="gelb")yellows.push(it.t);else if(v==="rot")reds.push(it.t);}));
  const weak=[...reds,...yellows].slice(0,3);
  const openRisk=RISK_THEMES.filter(t=>riskStatus(s,t.id)!=="sicher");
  const R=examReadiness(s);
  const strengths=[];
  if(greens.length) strengths.push(`${greens.length} von ${ALL_SKILLS.length} Themen sicher`);
  if(E) strengths.push(COLOR_EXTRA[E.top].staerken[0]);
  if(!strengths.length) strengths.push("Noch am Anfang – jede Stunde zählt.");
  const weaks=[];
  if(weak.length) weaks.push(weak.join(" · "));
  if(openRisk.length) weaks.push(`${openRisk.length} Risiko-Themen noch nicht sicher`);
  if(!weaks.length) weaks.push("Keine offenen Schwächen – stark!");
  const focus=autoNext(s).text;
  const missing=R.items.filter(it=>it.ok===false).map(it=>it.label.replace(/\s*\(.*?\)/,""));
  const last=planLastDate(s.plan); let stale="";
  if((reds.length||yellows.length)&&last){ const d=daysSince(last.iso); if(d!=null&&d>=14) stale=`<div class="lage-warn">${ICN.bolt}<span>Seit ${d} Tagen keine Fahrstunde – Geübtes auffrischen, bevor es verblasst.</span></div>`; }
  return `<div class="lage">
    <div class="lage-h">${ICN.flag} Lagebild</div>
    <div class="lage-grid">
      <div class="lage-sec lage-strong"><div class="lage-lab">Stärken</div><div class="lage-val">${strengths.join(" · ")}</div></div>
      <div class="lage-sec lage-weak"><div class="lage-lab">Schwächen</div><div class="lage-val">${weaks.join(" · ")}</div></div>
    </div>
    <div class="lage-focus"><div class="lage-lab">Nächster Fokus</div><div class="lage-val">${esc(focus)}</div></div>
    ${missing.length?`<div class="lage-miss"><div class="lage-lab">Fehlt noch für die Prüfung</div><div class="lage-val">${missing.join(" · ")}</div></div>`:`<div class="lage-miss done"><div class="lage-lab">Prüfungs-Freigabe</div><div class="lage-val">Alle Punkte erfüllt ✓</div></div>`}
    ${stale}
  </div>`;
}

function routeRisk(id){
  const s=DB.students.find(x=>x.id===id); if(!s){routeHome();return;} ensure(s);
  $("#tbTitle").textContent="Risiko-Themen"; setFab(false); view.scrollTop=0;
  const sicher=RISK_THEMES.filter(t=>riskStatus(s,t.id)==="sicher").length;
  const pctSafe=Math.round(sicher/RISK_THEMES.length*100);
  view.innerHTML=`<div class="view-inner fade-up">
    <div class="back-row"><button class="back-btn" id="backBtn">${ICN.back} ${esc(s.name)}</button></div>
    <div class="risk-intro">
      <div class="sec-h">Prüfungs-<span class="o">Risiko-Check</span></div>
      <p class="risk-lead">Das sind die Punkte, an denen Prüflinge am häufigsten durchfallen. Setz jedes Thema erst auf <b>sicher</b>, wenn es im Verkehr zuverlässig sitzt – das ist deine letzte Checkliste vor der Anmeldung.</p>
      <div class="risk-prog"><div class="risk-prog-bar"><span style="width:${pctSafe}%"></span></div><div class="risk-prog-txt"><b>${sicher}/${RISK_THEMES.length}</b> sicher</div></div>
    </div>
    <div class="risk-list">${RISK_THEMES.map(t=>{const st=riskStatus(s,t.id);return `
      <div class="risk-item risk-${st}">
        <div class="risk-name">${t.t}</div>
        <div class="risk-why">${t.warum}</div>
        <div class="risk-seg">${["offen","unsicher","sicher"].map(k=>`<button class="rseg rseg-${k}${st===k?" on":""}" data-th="${t.id}" data-st="${k}">${RISK_LABEL[k]}</button>`).join("")}</div>
      </div>`;}).join("")}</div>
  </div>`;
  $("#backBtn").addEventListener("click",()=>routeDetail(id));
  document.querySelectorAll(".rseg").forEach(b=>b.addEventListener("click",()=>{ if(!s.risk)s.risk={}; s.risk[b.dataset.th]=b.dataset.st; save(); routeRisk(id); }));
}

(function(){

  const fonts=(document.fonts&&document.fonts.ready)?document.fonts.ready:Promise.resolve();
  const cap=new Promise(r=>setTimeout(r,3000));
  Promise.all([minWait,Promise.race([fonts,cap])]).then(()=>{
