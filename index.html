<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0c1410">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fahrlehrer-Kompass">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Fahrlehrer-Kompass</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Kaushan+Script&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,500;1,600&family=Barlow:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  /* === Waldgrün-Basis (heller als vorher, warm) === */
  --bg:#0c1410; --bg-soft:#101a14; --surface:#16241c; --surface-2:#1e3026;
  --line:#2c4233; --line-soft:#22341a;
  --txt:#eaf1ec; --muted:#9fb3a6; --faint:#6d8276;
  /* === Waldgrün-Akzent (ersetzt Orange; Variablennamen bleiben für Kompatibilität) === */
  --orange:#3a7350; --orange-soft:rgba(58,115,80,.18); --orange-line:rgba(120,170,140,.34);
  --akzent:#3a7350; --akzent-dark:#2f5d3f; --akzent-bright:#4a8b5c;
  /* === Ampel-Farben (UNVERÄNDERT – sonst werden Skills unkenntlich) === */
  --rot:#cf5a48; --gelb:#cf9a3e; --gruen:#4caf72; --blau:#2F7DD1;
  /* heller Grünton für Kalender/Dashboard-Akzente (war bisher nur per Fallback gesetzt) */
  --gruen-bright:#4a8b45;
  /* === Glasmorphism === */
  --glass:rgba(28, 48, 37, 0.55); --glass-2:rgba(34, 58, 45, 0.42);
  --glass-brd:rgba(120, 170, 140, 0.16); --glass-brd-top:rgba(170, 210, 185, 0.26);
  --glass-glow:rgba(60, 110, 75, 0.28);
  /* === 3D-Schatten === */
  --elev-1:0 2px 8px rgba(0,0,0,.28);
  --elev-2:0 12px 28px rgba(0,0,0,.34);
  --elev-3:0 18px 44px rgba(0,0,0,.42);
  --inset-top:inset 0 1px 0 var(--glass-brd-top);
  --r-card:20px; --r-tile:16px; --r-field:12px;
  --pad: clamp(16px, 4vw, 34px);
  --ease: cubic-bezier(.4,0,.2,1);
  --pop: cubic-bezier(.34,1.56,.64,1);
  --smooth: cubic-bezier(.25,.46,.45,.94);
}
/* ===== HELL-MODUS ===== */
body{transition:background-color .3s var(--ease,ease),color .3s var(--ease,ease);}
body.light{
  --bg:#eef4ef; --bg-soft:#e4ede6; --surface:#f8fbf8; --surface-2:#ddeae0;
  --line:#a8c8b4; --line-soft:#bcd6c6;
  --txt:#0d1a10; --muted:#2a4535; --faint:#4e7260;
  --glass:rgba(248,251,248,.95); --glass-2:rgba(234,244,236,.90);
  --glass-brd:rgba(58,115,80,.22); --glass-brd-top:rgba(58,115,80,.32);
  --glass-glow:rgba(58,115,80,.10);
  --elev-1:0 2px 8px rgba(0,0,0,.09); --elev-2:0 5px 18px rgba(0,0,0,.12); --elev-3:0 10px 28px rgba(0,0,0,.15);
  --orange-soft:rgba(58,115,80,.12); --orange-line:rgba(58,115,80,.25);
}
body.light::before{
  background:radial-gradient(120% 80% at 50% -10%,#c8e4d0 0%,var(--bg) 55%),
    radial-gradient(80% 50% at 80% 110%,#bfdfcc 0%,transparent 60%);}
body.light::after{opacity:.05;}
body.light .topbar{background:linear-gradient(180deg,rgba(238,244,239,.98),rgba(238,244,239,.85));}
body.light .drawer{background:linear-gradient(170deg,#daeae0,#cde3d6);}
body.light .sheet{background:#f2f8f4;}
body.light .splash-bg,body.light #splash{background:radial-gradient(120% 90% at 50% 20%,#c8e4d0 0%,#eef4ef 70%);}
/* Logo sichtbar im Hell-Modus */
body.light .tb-logo-wrap{
  background:radial-gradient(120% 120% at 50% 0%,rgba(40,90,55,.85),rgba(14,38,22,.95));
  box-shadow:0 4px 14px rgba(0,0,0,.25),var(--inset-top);}
body.light .brand-mark{
  background:radial-gradient(120% 120% at 50% 0%,rgba(40,90,55,.85),rgba(14,38,22,.95));
  box-shadow:0 4px 12px rgba(0,0,0,.2);}
/* Cards im Hell-Modus — mehr Kontrast */
body.light .s-card{background:linear-gradient(160deg,#ffffff,#f4faf5);border-color:var(--line);box-shadow:0 2px 10px rgba(0,0,0,.09);}
body.light .s-name{color:#0d1a10;}
body.light .s-meta{color:#2a4535;}
body.light .s-form-chip{background:#ddeae0;border-color:var(--line);color:#0d1a10;}
body.light .d-tile{background:linear-gradient(160deg,#ffffff,#f2f9f3);border-color:var(--line);}
body.light .nav-action{background:linear-gradient(160deg,#ffffff,#f2f9f3);border-color:var(--line);}
body.light .mini-stat{background:#ffffff;border-color:var(--line);}
body.light .seg-i{background:#e4ede6;color:#2a4535;border-color:var(--line);}
body.light .seg-i.on{background:var(--akzent);color:#fff;}
body.light .month-bars{background:#ffffff;border-color:var(--line);}
body.light .blk-h{color:#2a4535;}
body.light .muted-p{color:#2a4535;}
/* ===== THEME-TOGGLE BUTTON ===== */
.theme-btn{width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;
  background:var(--glass);border:1px solid var(--glass-brd);color:var(--muted);
  transition:transform .16s var(--pop);flex:0 0 auto;margin-right:6px;}
.theme-btn:active{transform:scale(.88);}
.theme-btn svg{width:18px;height:18px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{background:var(--bg);color:var(--txt);font-family:'Barlow',system-ui,sans-serif;
  font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow:hidden;position:relative;}
/* Waldgrün-Verlauf + dezentes Kartenraster im Hintergrund */
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(120% 80% at 50% -10%, #12211a 0%, var(--bg) 55%),radial-gradient(80% 50% at 80% 110%, #0e1c15 0%, transparent 60%);}
body::after{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.03;
  background-image:linear-gradient(rgba(150,200,165,.6) 1px,transparent 1px),linear-gradient(90deg,rgba(150,200,165,.6) 1px,transparent 1px);
  background-size:48px 48px,48px 48px;
  -webkit-mask-image:radial-gradient(80% 60% at 50% 25%,#000 0%,transparent 75%);mask-image:radial-gradient(80% 60% at 50% 25%,#000 0%,transparent 75%);}
button{font-family:inherit;color:inherit;cursor:pointer;border:none;background:none;}
input,select,textarea{font-family:inherit;font-size:15px;color:var(--txt);}
::selection{background:rgba(74,139,92,.32);}
.display{font-family:'Anton',sans-serif;font-weight:400;text-transform:uppercase;letter-spacing:.02em;}
.script{font-family:'Kaushan Script',cursive;}
.serif{font-family:'Playfair Display',Georgia,serif;}
.o{color:var(--akzent-bright);}


/* ===== SPLASH ===== */
#splash{position:fixed;inset:0;z-index:200;background:radial-gradient(120% 90% at 50% 20%,#12211a 0%,#0a110d 70%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  transition:opacity .9s var(--ease),visibility .9s var(--ease);}
#splash.hide{opacity:0;visibility:hidden;}
/* Beim Ausblenden lösen sich die Elemente fließend nach oben auf */
#splash.hide img{animation:spOut .9s var(--ease) forwards;}
#splash.hide .sp-name{animation:spOut .9s var(--ease) .06s forwards;}
#splash.hide .sp-quote{animation:spOut .9s var(--ease) .12s forwards;}
@keyframes spOut{to{opacity:0;transform:translateY(-26px) scale(1.04);filter:blur(8px);}}
#splash img{width:clamp(96px,26vw,128px);border-radius:26px;
  box-shadow:0 20px 50px rgba(0,0,0,.55), var(--inset-top), inset 0 -2px 8px rgba(0,0,0,.4);
  animation:spIn .9s var(--pop) both;}
#splash .sp-name{font-family:'Playfair Display',serif;font-weight:600;font-size:clamp(30px,8vw,40px);letter-spacing:.01em;color:var(--txt);
  animation:spIn .9s var(--pop) .1s both;padding:0 8px;}
#splash .sp-name b{font-style:italic;font-weight:600;color:#bcd6c5;}
#splash .sp-quote{max-width:78%;text-align:center;color:var(--txt);font-size:14px;line-height:1.65;font-style:normal;
  animation:spIn .9s var(--ease) .25s both;}
#splash .sp-by{display:block;margin-top:9px;font-style:normal;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:#7a9a82;}
#splash .sp-by b{color:#bcd6c5;font-weight:700;}
@keyframes spIn{from{opacity:0;transform:scale(.94) translateY(12px);}to{opacity:1;transform:none;}}

/* ===== SHELL ===== */
.app{display:flex;flex-direction:column;height:100dvh;position:relative;overflow:hidden;z-index:1;}
.topbar{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;
  padding:calc(12px + env(safe-area-inset-top)) var(--pad) 12px;
  border-bottom:1px solid var(--line-soft);position:relative;z-index:5;flex:0 0 auto;
  background:linear-gradient(180deg,rgba(12,20,16,.92),rgba(12,20,16,.55));backdrop-filter:blur(8px);}
.tb-side{display:flex;align-items:center;min-width:0;}
.tb-left{justify-content:flex-start;}
.tb-right{justify-content:flex-end;}
/* Zentrales Logo als Home-Button */
.tb-logo-btn{justify-self:center;display:flex;align-items:center;justify-content:center;padding:0;
  transition:transform .16s var(--pop);}
.tb-logo-btn:active{transform:scale(.9);}
.tb-logo-wrap{width:50px;height:50px;border-radius:15px;display:flex;align-items:center;justify-content:center;overflow:hidden;
  background:radial-gradient(120% 120% at 50% 0%, rgba(60,90,70,.5), rgba(18,30,22,.75));
  border:1px solid var(--glass-brd);
  box-shadow:0 8px 20px rgba(0,0,0,.45), var(--inset-top), inset 0 -3px 8px rgba(0,0,0,.35);}
.tb-logo-wrap img{width:88%;height:88%;object-fit:contain;
  filter:drop-shadow(0 1px 2px rgba(0,0,0,.5));}
.icon-btn{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;
  color:var(--txt);background:var(--glass);border:1px solid var(--glass-brd);box-shadow:var(--inset-top);backdrop-filter:blur(8px);
  transition:background .18s var(--ease),transform .12s var(--ease);}
.icon-btn:hover{background:var(--surface-2);}
.icon-btn:active{transform:scale(.9);}
.icon-btn svg{width:21px;height:21px;}
.tb-title{font-family:'Playfair Display',serif;font-weight:600;letter-spacing:.01em;font-size:16px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--muted);text-align:right;}
.view{flex:1 1 auto;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;position:relative;}
.view-inner{padding:var(--pad);padding-bottom:130px;}
.view-wide{max-width:1100px;margin:0 auto;}
.view-read{max-width:780px;margin:0 auto;}

/* ===== FAB ===== */
.fab{position:absolute;right:var(--pad);bottom:calc(22px + env(safe-area-inset-bottom));z-index:20;
  height:58px;min-width:58px;padding:0 22px;border-radius:18px;
  background:linear-gradient(160deg,var(--akzent-bright),var(--akzent-dark));color:#fff;
  display:flex;align-items:center;gap:10px;font-weight:800;font-size:15px;letter-spacing:.01em;
  box-shadow:0 14px 30px rgba(0,0,0,.45), inset 0 1px 0 rgba(190,220,200,.25), inset 0 -2px 6px rgba(0,0,0,.3);
  transition:transform .16s var(--pop),box-shadow .16s var(--ease);}
.fab svg{width:22px;height:22px;}
.fab:active{transform:scale(.93);}

/* ===== DRAWER ===== */
.scrim{position:fixed;inset:0;background:rgba(6,12,9,.62);backdrop-filter:blur(3px);
  opacity:0;visibility:hidden;transition:opacity .26s var(--ease),visibility .26s var(--ease);z-index:40;}
.scrim.open{opacity:1;visibility:visible;}
.drawer{position:fixed;top:0;left:0;bottom:0;width:min(322px,86vw);
  background:linear-gradient(170deg,#16241c,#101a14);
  border-right:1px solid var(--line);z-index:50;transform:translateX(-104%);
  transition:transform .3s var(--ease);display:flex;flex-direction:column;padding-top:env(safe-area-inset-top);}
.drawer.open{transform:translateX(0);box-shadow:24px 0 60px rgba(0,0,0,.5);}
.drawer-head{padding:24px 22px 20px;border-bottom:1px solid var(--line-soft);}
.brand{display:flex;align-items:center;gap:13px;}
.brand-mark{width:48px;height:48px;flex:0 0 auto;border-radius:14px;overflow:hidden;box-shadow:var(--inset-top),0 6px 16px rgba(0,0,0,.4);}
.brand-mark img{width:100%;height:100%;object-fit:contain;}
.brand-eye{font-family:'Barlow',sans-serif;font-weight:600;font-size:10.5px;color:var(--faint);letter-spacing:.26em;text-transform:uppercase;}
.brand-script{font-family:'Playfair Display',serif;font-weight:600;font-size:24px;color:var(--txt);line-height:1.1;padding-right:4px;}
.brand-script b{font-style:italic;color:#bcd6c5;font-weight:600;}
.drawer-nav{padding:14px 12px;flex:1;overflow-y:auto;}
.nav-item{display:flex;align-items:center;gap:14px;width:100%;text-align:left;
  padding:13px 14px;border-radius:13px;font-size:15px;font-weight:600;color:var(--txt);
  transition:background .16s var(--ease);}
.nav-item:hover{background:var(--glass);}
.nav-item:active{background:var(--surface-2);}
.nav-item svg{width:20px;height:20px;color:var(--muted);flex:0 0 auto;}
.nav-item.primary svg{color:var(--akzent-bright);}
.nav-sep{height:1px;background:var(--line-soft);margin:10px 14px;}
.nav-tag{font-family:'Barlow',sans-serif;font-weight:700;font-size:10px;color:var(--faint);letter-spacing:.22em;text-transform:uppercase;padding:8px 14px 6px;}
.drawer-foot{padding:16px 22px calc(18px + env(safe-area-inset-bottom));border-top:1px solid var(--line-soft);
  font-size:11.5px;color:var(--faint);}

/* ===== HOME ===== */
.hero{position:relative;margin-bottom:8px;}
.hero .greet{font-size:14px;color:var(--muted);font-weight:600;}
.hero .hero-brand{font-family:'Playfair Display',serif;font-weight:600;font-size:clamp(34px,8vw,46px);
  color:var(--txt);line-height:1.05;padding:2px 8px 6px 0;}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-top:14px;}
.stat{position:relative;overflow:hidden;background:linear-gradient(160deg,var(--glass),var(--glass-2));
  border:1px solid var(--glass-brd);border-radius:var(--r-tile);box-shadow:var(--elev-2),var(--inset-top);backdrop-filter:blur(12px);
  padding:15px 16px;display:flex;flex-direction:column;align-items:flex-start;gap:10px;}
.stat::before{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;background:linear-gradient(130deg,rgba(190,220,200,.08),transparent 35%);}
.stat .badge{width:44px;height:44px;border-radius:13px;flex:0 0 auto;position:relative;z-index:1;
  background:linear-gradient(150deg,#244134,#15231b);box-shadow:var(--inset-top),inset 0 -3px 8px rgba(0,0,0,.35),0 4px 12px rgba(0,0,0,.3);
  display:flex;align-items:center;justify-content:center;}
.stat .badge svg{width:22px;height:22px;color:#bcd6c5;}
.stat .sv{font-family:'Playfair Display',serif;font-weight:600;font-size:30px;line-height:1;letter-spacing:.01em;position:relative;z-index:1;
  background:linear-gradient(160deg,#fff 10%,#bcd6c5 90%);-webkit-background-clip:text;background-clip:text;color:transparent;}
.stat .sl{font-size:11.5px;color:var(--muted);margin-top:4px;font-weight:600;letter-spacing:.02em;position:relative;z-index:1;}
.brush{height:2px;margin:22px 0 18px;background:linear-gradient(90deg,transparent,var(--glass-brd) 20%,var(--glass-brd) 80%,transparent);}
.sec-h{font-family:'Playfair Display',serif;font-weight:600;font-size:clamp(24px,4.8vw,32px);letter-spacing:.01em;line-height:1.05;}
.row-between{display:flex;align-items:baseline;justify-content:space-between;gap:12px;}
.count-pill{font-size:13px;color:var(--muted);font-weight:700;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(272px,1fr));gap:14px;margin-top:16px;}
.s-card{position:relative;overflow:hidden;background:linear-gradient(160deg,var(--glass),var(--glass-2));
  border:1px solid var(--glass-brd);border-radius:var(--r-card);box-shadow:var(--elev-1),var(--inset-top);backdrop-filter:blur(12px);
  padding:17px;display:flex;align-items:center;gap:16px;text-align:left;width:100%;
  transition:border-color .18s var(--ease),transform .18s var(--pop),box-shadow .25s var(--ease);
  animation:cardIn .5s var(--ease) both;}
.s-card:hover{border-color:var(--glass-brd-top);}
.s-card:active{transform:translateY(-3px);box-shadow:var(--elev-2),var(--inset-top);}
.s-card .s-body{flex:1;min-width:0;}
.s-name{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;letter-spacing:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.s-meta{display:flex;align-items:center;gap:8px;margin-top:4px;font-size:12.5px;color:var(--muted);font-weight:600;}
.s-dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;}
.s-form-chip{font-size:11px;font-weight:800;letter-spacing:.04em;color:var(--txt);
  background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:1px 6px;}
@keyframes cardIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:60vh;padding:30px;}
.empty img{width:110px;margin-bottom:20px;border-radius:24px;box-shadow:var(--inset-top),0 16px 40px rgba(0,0,0,.5);animation:cardIn .6s var(--ease) both;}
.empty h2{font-family:'Playfair Display',serif;font-weight:600;font-size:26px;letter-spacing:.01em;margin-bottom:8px;}
.empty p{color:var(--muted);max-width:340px;margin-bottom:26px;font-size:14.5px;}

/* ===== BUTTONS ===== */
.btn-row{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap;}
.btn{padding:14px 24px;border-radius:14px;font-weight:800;font-size:15px;letter-spacing:.01em;
  transition:transform .15s var(--pop),background .15s var(--ease),border-color .15s var(--ease);
  display:inline-flex;align-items:center;justify-content:center;gap:9px;}
.btn:active{transform:scale(.96);}
.btn-primary{background:linear-gradient(160deg,var(--akzent-bright),var(--akzent-dark));color:#fff;flex:1;min-width:160px;
  border:1px solid rgba(150,200,165,.2);box-shadow:0 8px 20px rgba(0,0,0,.35),inset 0 1px 0 rgba(190,220,200,.25),inset 0 -2px 6px rgba(0,0,0,.3);}
.btn-primary:hover{filter:brightness(1.08);}
.btn-ghost{background:var(--glass);border:1px solid var(--glass-brd);color:var(--txt);box-shadow:var(--inset-top);backdrop-filter:blur(8px);}
.btn-ghost:hover{border-color:var(--glass-brd-top);}
.btn-danger{background:transparent;border:1px solid rgba(207,90,72,.4);color:#e2705f;}
.btn svg{width:18px;height:18px;}
.btn-full{width:100%;}

/* ===== DETAIL ===== */
.back-row{display:flex;align-items:center;gap:6px;margin-bottom:16px;}
.back-btn{display:inline-flex;align-items:center;gap:7px;padding:8px 14px 8px 10px;border-radius:11px;
  font-weight:700;font-size:14px;color:var(--txt);transition:background .16s var(--ease);}
.back-btn:hover{background:var(--bg-soft);}
.back-btn svg{width:18px;height:18px;}
.detail-hero{padding:6px 0 20px;border-bottom:1px solid var(--line-soft);margin-bottom:20px;
  display:flex;align-items:center;gap:24px;flex-wrap:wrap;}
.detail-name{font-family:'Anton',sans-serif;text-transform:uppercase;font-size:clamp(26px,5vw,38px);letter-spacing:.02em;line-height:1.02;}
.detail-id{flex:1;min-width:200px;}
.detail-line{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-top:12px;}
.chip{display:inline-flex;align-items:center;gap:8px;padding:6px 12px 6px 10px;border-radius:30px;
  background:var(--glass);border:1px solid var(--glass-brd);font-size:13px;font-weight:700;box-shadow:var(--inset-top);}
.chip .cdot{width:11px;height:11px;border-radius:50%;}
.chip-form{padding:6px 12px;}
.chip-goal{border-color:transparent;background:linear-gradient(160deg,var(--akzent-bright),var(--akzent-dark));color:#fff;}
.nav-actions{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:14px;}
.nav-action{display:flex;align-items:center;gap:14px;text-align:left;
  background:linear-gradient(160deg,var(--glass),var(--glass-2));border:1px solid var(--glass-brd);border-radius:var(--r-tile);padding:16px;
  box-shadow:var(--elev-1),var(--inset-top);backdrop-filter:blur(12px);
  transition:border-color .18s var(--ease),transform .18s var(--pop),box-shadow .25s var(--ease);}
.nav-action:hover{border-color:var(--glass-brd-top);}
.nav-action:active{transform:translateY(-3px);box-shadow:var(--elev-2),var(--inset-top);}
.na-ic{width:48px;height:48px;border-radius:14px;flex:0 0 auto;
  background:linear-gradient(150deg,#244134,#15231b);box-shadow:var(--inset-top),inset 0 -3px 8px rgba(0,0,0,.35),0 4px 12px rgba(0,0,0,.3);
  display:flex;align-items:center;justify-content:center;}
.na-ic svg{width:22px;height:22px;color:#bcd6c5;}
.na-body{flex:1;min-width:0;}
.na-name{font-family:'Playfair Display',serif;font-size:17px;font-weight:600;letter-spacing:0;}
.na-sub{font-size:12px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600;}
.na-arrow{color:var(--faint);flex:0 0 auto;}
.na-arrow svg{width:18px;height:18px;}
.termine{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:14px;}
.termin-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-tile);padding:15px 17px;}
.tm-label{font-family:'Anton',sans-serif;font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);}
.tm-date{font-family:'Anton',sans-serif;font-size:23px;letter-spacing:.02em;margin-top:8px;line-height:1.05;}
.tm-date.empty{color:var(--faint);}
.tm-foot{font-size:12px;color:var(--muted);margin-top:6px;font-weight:600;}
.tm-actions{margin-top:11px;}
.tm-btn{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:800;color:var(--orange);
  background:var(--orange-soft);border:1px solid var(--orange-line);border-radius:10px;padding:8px 13px;
  transition:background .15s var(--ease),transform .15s var(--pop);}
.tm-btn:active{transform:scale(.95);}
.tm-btn svg{width:16px;height:16px;}
.next-step{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-tile);
  padding:15px 17px;margin-bottom:14px;display:flex;align-items:center;gap:14px;}
.ns-ic{width:40px;height:40px;border-radius:10px;background:var(--orange);transform:rotate(-2deg);
  display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
.ns-ic svg{width:19px;height:19px;color:#fff;}
.ns-label{font-family:'Anton',sans-serif;font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);}
.ns-text{font-size:15.5px;font-weight:700;margin-top:2px;}
.ns-auto{font-size:11px;color:var(--faint);font-weight:700;margin-left:6px;letter-spacing:.04em;}
.tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:13px;}
.tile{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-tile);
  padding:16px;text-align:left;display:flex;flex-direction:column;gap:26px;min-height:112px;
  transition:border-color .18s var(--ease),background .18s var(--ease),transform .14s var(--ease);}
.tile:hover{border-color:var(--orange-line);background:#27292f;}
.tile:active{transform:scale(.98);}
.t-ic{width:42px;height:42px;border-radius:10px;background:var(--orange);transform:rotate(-2deg);
  display:flex;align-items:center;justify-content:center;}
.t-ic svg{width:20px;height:20px;color:#fff;}
.t-foot{display:flex;align-items:flex-end;justify-content:space-between;gap:8px;margin-top:auto;}
.t-name{font-size:15px;font-weight:800;}
.t-sub{font-size:12px;color:var(--muted);margin-top:2px;font-weight:600;}
.t-arrow{color:var(--faint);}
.t-arrow svg{width:18px;height:18px;}

/* ===== FORM ===== */
.form-block{display:flex;flex-direction:column;gap:20px;}
.field label{display:block;font-size:12.5px;font-weight:700;color:var(--muted);margin-bottom:8px;letter-spacing:.02em;}
.field input,.field textarea{width:100%;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-field);
  padding:13px 15px;outline:none;transition:border-color .16s var(--ease),background .16s var(--ease);}
.field input::placeholder,.field textarea::placeholder{color:var(--faint);}
.field input:focus,.field textarea:focus{border-color:var(--orange);background:var(--bg-soft);}
.field textarea{resize:vertical;min-height:110px;line-height:1.55;}
.pills{display:flex;flex-wrap:wrap;gap:9px;}
.pill{padding:10px 16px;border-radius:11px;background:var(--surface);border:1px solid var(--line);
  font-size:14px;font-weight:700;transition:all .15s var(--ease);}
.pill:active{transform:scale(.95);}
.pill.sel{background:var(--orange);color:#fff;border-color:var(--orange);}
.color-opts{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.color-opt{display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:12px;
  background:var(--surface);border:1px solid var(--line);transition:all .15s var(--ease);text-align:left;}
.color-opt:active{transform:scale(.97);}
.co-dot{width:18px;height:18px;border-radius:50%;flex:0 0 auto;}
.co-name{font-size:14px;font-weight:700;line-height:1.2;}
.co-sub{font-size:11.5px;color:var(--muted);}
.color-opt.sel{border-color:var(--orange);background:var(--orange-soft);}
.hint-card{background:var(--bg-soft);border:1px solid var(--line-soft);border-radius:14px;padding:15px 17px;display:flex;gap:13px;align-items:center;}
.hint-card .ns-ic{transform:none;}

/* ===== BOGEN (Wizard) ===== */
.wiz-top{position:sticky;top:0;z-index:4;background:var(--bg);padding:6px 0 12px;}
.wiz-bar{height:7px;border-radius:6px;background:var(--surface-2);overflow:hidden;}
.wiz-fill{height:100%;width:0;background:var(--orange);border-radius:6px;transition:width .4s var(--ease);}
.wiz-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);font-weight:700;margin-top:7px;letter-spacing:.03em;}
.q-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-card);
  padding:18px;margin-bottom:13px;animation:cardIn .42s var(--ease) both;}
.q-text{font-size:15.5px;font-weight:600;line-height:1.5;}
.likert{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:15px;}
.lk{flex:1;height:46px;border-radius:11px;background:var(--bg);border:1.5px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:var(--muted);
  transition:all .14s var(--pop);}
.lk:active{transform:scale(.92);}
.lk.sel{background:var(--orange);border-color:var(--orange);color:#fff;transform:scale(1.05);}
.lk-ends{display:flex;justify-content:space-between;font-size:11px;color:var(--faint);font-weight:700;margin-top:7px;letter-spacing:.02em;}
.wiz-nav{display:flex;gap:12px;margin-top:18px;}
.bogen-intro{ text-align:center;padding-top:8vh;}
.bogen-intro img{width:110px;filter:drop-shadow(0 0 24px rgba(232,69,31,.3));margin-bottom:18px;}
.bogen-intro h2{font-family:'Anton',sans-serif;text-transform:uppercase;font-size:26px;letter-spacing:.03em;margin-bottom:10px;}
.bogen-intro p{color:var(--muted);max-width:420px;margin:0 auto 26px;font-size:14.5px;}

/* ===== ERGEBNIS ===== */
.res-hero{text-align:center;padding:18px 0 8px;}
.pc-wrap{display:flex;align-items:center;gap:18px;flex-wrap:wrap;margin-top:4px;}
.pc-donut{flex:0 0 auto;text-align:center;}
.pc-donut-cap{font-size:9.5px;font-weight:700;letter-spacing:1.3px;color:var(--muted);text-transform:uppercase;margin-top:-6px;}
.pc-bars{flex:1;min-width:170px;display:flex;flex-direction:column;gap:11px;}
.pc-bar-row{display:flex;align-items:center;gap:9px;}
.pc-bar-lab{display:flex;align-items:center;gap:6px;font-weight:700;font-size:12.5px;width:58px;flex:0 0 auto;}
.pc-dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;}
.pc-bar-track{flex:1;height:9px;border-radius:6px;background:var(--line);overflow:hidden;}
.pc-bar-fill{display:block;height:100%;border-radius:6px;transition:width .7s var(--ease);}
.pc-bar-val{width:42px;text-align:right;font-weight:800;font-size:12.5px;flex:0 0 auto;}
.pc-foot{font-size:11.5px;color:var(--muted);margin-top:12px;line-height:1.5;}
@media(max-width:420px){.pc-wrap{flex-direction:column;align-items:stretch;}.pc-donut{align-self:center;}}
.res-dot{width:104px;height:104px;border-radius:50%;margin:0 auto 16px;
  display:flex;align-items:center;justify-content:center;
  animation:dotPop .7s var(--pop) .15s both;box-shadow:0 14px 44px rgba(0,0,0,.4);}
.res-dot .inner{font-family:'Anton',sans-serif;font-size:30px;color:#fff;text-transform:uppercase;}
@keyframes dotPop{from{transform:scale(0);}to{transform:scale(1);}}
.res-main{font-family:'Anton',sans-serif;text-transform:uppercase;font-size:clamp(24px,5vw,32px);letter-spacing:.02em;animation:cardIn .5s var(--ease) .3s both;}
.res-sub{color:var(--muted);font-size:14px;margin-top:8px;animation:cardIn .5s var(--ease) .4s both;max-width:520px;margin-left:auto;margin-right:auto;}
.res-block{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-card);padding:18px;margin-top:14px;animation:cardIn .5s var(--ease) both;}
.res-block h4{font-family:'Anton',sans-serif;text-transform:uppercase;font-size:13px;letter-spacing:.14em;color:var(--orange);margin-bottom:9px;}
.res-block p{font-size:14.5px;line-height:1.65;color:var(--txt);}
.res-block ul{margin:4px 0 0 18px;display:flex;flex-direction:column;gap:6px;font-size:14.5px;}
.res-block .sub-h{font-weight:800;font-size:13.5px;margin:13px 0 5px;color:var(--txt);}
.copybox{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:13px;
  font-size:12.5px;line-height:1.6;color:var(--muted);min-height:150px;resize:vertical;}

/* ===== PLAN ===== */
.plan-head{display:flex;align-items:center;gap:20px;flex-wrap:wrap;padding-bottom:18px;border-bottom:1px solid var(--line-soft);margin-bottom:18px;}
.plan-head .ph-body{flex:1;min-width:200px;}
.plan-title{font-family:'Anton',sans-serif;text-transform:uppercase;font-size:clamp(22px,4.5vw,30px);letter-spacing:.02em;line-height:1.05;}
.plan-sub{color:var(--muted);font-size:13px;font-weight:600;margin-top:5px;}
.theorie-card{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--line);
  border-radius:var(--r-tile);padding:14px 16px;margin-bottom:14px;}
.theorie-card .tc-body{flex:1;}
.theorie-card .tc-name{font-weight:800;font-size:15px;}
.theorie-card .tc-sub{font-size:12px;color:var(--muted);font-weight:600;margin-top:1px;}
.check-toggle{width:54px;height:34px;border-radius:20px;background:var(--surface-2);border:1.5px solid var(--line);
  position:relative;transition:all .2s var(--ease);flex:0 0 auto;}
.check-toggle::after{content:"";position:absolute;left:3px;top:3px;width:25px;height:25px;border-radius:50%;
  background:var(--muted);transition:all .22s var(--pop);}
.check-toggle.on{background:var(--gruen);border-color:var(--gruen);}
.check-toggle.on::after{left:23px;background:#fff;}
.plan-sec{margin-top:22px;}
.plan-sec-h{display:flex;align-items:baseline;gap:10px;margin-bottom:12px;}
.plan-sec-h .nr{font-family:'Anton',sans-serif;color:var(--orange);font-size:15px;}
.plan-sec-h .ti{font-family:'Anton',sans-serif;text-transform:uppercase;font-size:18px;letter-spacing:.04em;}
.plan-sec-h .su{font-size:12px;color:var(--muted);font-weight:600;}
.std-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:8px;}
.std{border:1px solid var(--line);background:var(--surface);border-radius:10px;cursor:pointer;
  display:flex;flex-direction:column;justify-content:space-between;gap:3px;min-height:72px;padding:6px 6px 5px;
  transition:border-color .15s var(--ease),background .15s var(--ease);}
.std:active{transform:scale(.96);}
.std .std-top{display:flex;align-items:center;justify-content:space-between;line-height:1;}
.std .n{font-size:10px;font-weight:800;color:var(--muted);}
.std .cal{border:none;background:none;color:var(--muted);font-size:13px;line-height:1;cursor:pointer;padding:2px;opacity:.65;}
.std .d{font-family:'Anton',sans-serif;font-size:13px;color:var(--txt);line-height:1;text-align:center;min-height:13px;letter-spacing:.03em;}
.std .fc{font-size:9px;font-weight:800;letter-spacing:.06em;text-align:center;border:1px solid var(--line);
  border-radius:6px;padding:3px 0;color:var(--muted);background:transparent;cursor:pointer;transition:all .15s var(--ease);}
.std .fc.on{background:var(--gruen);border-color:var(--gruen);color:#fff;}
.std.filled{background:rgba(63,174,107,.15);border-color:var(--gruen);}
.std.filled .n{color:var(--gruen);}
.std.pop{animation:stdPop .3s var(--pop);}
@keyframes stdPop{0%{transform:scale(.9);}100%{transform:scale(1);}}
.legende{margin-top:9px;font-size:11.5px;color:var(--muted);font-weight:600;}
.sonder-row{margin:13px 0;}
.sonder-row .top{display:flex;justify-content:space-between;font-size:13.5px;font-weight:700;margin-bottom:7px;}
.sonder-row .soll{color:var(--muted);font-weight:600;}
.acc{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-card);margin-bottom:12px;overflow:hidden;}
.acc-h{display:flex;align-items:center;gap:13px;width:100%;padding:16px;text-align:left;}
.acc-h .nr{font-family:'Anton',sans-serif;color:var(--orange);font-size:16px;width:30px;}
.acc-h .ti{font-family:'Anton',sans-serif;text-transform:uppercase;font-size:16px;letter-spacing:.04em;flex:1;}
.acc-h .done{font-size:12px;color:var(--muted);font-weight:700;}
.acc-h .chev{transition:transform .25s var(--ease);color:var(--muted);}
.acc.open .acc-h .chev{transform:rotate(180deg);}
.acc-body{display:grid;grid-template-rows:0fr;transition:grid-template-rows .3s var(--ease);}
.acc.open .acc-body{grid-template-rows:1fr;}
.acc-inner{overflow:hidden;}
.skill{display:flex;align-items:center;gap:12px;padding:12px 16px;border-top:1px solid var(--line-soft);}
.skill .sk-t{flex:1;font-size:14px;font-weight:600;line-height:1.4;}
.sk-head{display:flex;align-items:center;gap:9px;}
.iBtn{width:23px;height:23px;flex:0 0 auto;border-radius:50%;background:var(--orange-soft);
  border:1.5px solid var(--orange-line);color:var(--orange);font-weight:900;font-size:14px;line-height:1;
  display:inline-flex;align-items:center;justify-content:center;transition:all .15s var(--pop);}
.iBtn:active{transform:scale(.85);}
.iBtn.on{background:var(--orange);color:#fff;border-color:var(--orange);}
.skill-info{display:grid;grid-template-rows:0fr;transition:grid-template-rows .28s var(--ease);background:var(--bg-soft);}
.skill-info.open{grid-template-rows:1fr;}
.skill-info .si-inner{overflow:hidden;}
.skill-info ul{margin:0;padding:12px 18px 14px 38px;display:flex;flex-direction:column;gap:7px;}
.skill-info li{font-size:13.5px;line-height:1.55;color:var(--txt);}
.skill-info b{color:var(--orange);font-weight:800;}
.ready-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-tile);padding:16px;margin-bottom:14px;}
.ready-card.active{border-color:var(--orange-line);background:var(--orange-soft);}
.ready-head{display:flex;align-items:center;gap:14px;}
.ready-head .rc-ic{width:42px;height:42px;border-radius:11px;background:var(--orange);transform:rotate(-2deg);
  display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
.ready-head .rc-ic svg{width:21px;height:21px;color:#fff;}
.ready-head .rc-body{flex:1;min-width:0;}
.ready-head .rc-name{font-weight:800;font-size:15px;}
.ready-head .rc-sub{font-size:12.5px;color:var(--muted);font-weight:600;margin-top:2px;}
.wait-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-card);padding:16px 18px;
  display:flex;align-items:center;gap:16px;width:100%;text-align:left;margin-bottom:12px;
  transition:border-color .18s var(--ease),transform .14s var(--ease);animation:cardIn .45s var(--ease) both;}
.wait-card:hover{border-color:var(--orange-line);}
.wait-card:active{transform:scale(.985);}
.pruef-tabs{display:flex;gap:7px;margin-bottom:16px;background:var(--bg-soft);border:1px solid var(--line);border-radius:13px;padding:4px;}
.pt-tab{flex:1;padding:10px 6px;border-radius:10px;font-size:12.5px;font-weight:700;color:var(--muted);background:transparent;display:flex;align-items:center;justify-content:center;gap:5px;}
.pt-tab.on{background:var(--gruen-soft);color:#bcd6c5;box-shadow:var(--inset-top);}
.pt-cnt{font-size:10.5px;background:var(--surface-2);color:var(--muted);border-radius:10px;padding:1px 6px;font-weight:800;}
.pt-tab.on .pt-cnt{background:var(--gruen-line);color:#bcd6c5;}
.ready-pct{flex:0 0 auto;font-family:'Playfair Display',serif;font-size:17px;font-weight:600;color:var(--muted);padding:3px 9px;border-radius:9px;background:var(--surface-2);border:1px solid var(--line);}
.ready-pct.ok{color:#7fcf9a;background:var(--gruen-soft);border-color:var(--gruen-line);}
.wait-days{flex:0 0 auto;text-align:center;min-width:62px;}
.wait-days .wd-n{font-family:'Anton',sans-serif;font-size:30px;line-height:1;color:var(--orange);}
.wait-days .wd-l{font-size:10.5px;color:var(--muted);font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-top:3px;}
.wait-body{flex:1;min-width:0;}
.wait-name{font-size:16px;font-weight:800;}
.wait-since{font-size:12.5px;color:var(--muted);font-weight:600;margin-top:3px;}
@media(max-width:520px){.stats{grid-template-columns:1fr 1fr;}}
.skill .sk-ort{font-size:11.5px;color:var(--muted);font-weight:600;margin-top:2px;}
.ampel{display:flex;gap:7px;flex:0 0 auto;}
.amp{width:26px;height:26px;border-radius:50%;border:2px solid var(--line);background:transparent;transition:all .15s var(--pop);}
.amp:active{transform:scale(.85);}
.amp[data-v="rot"].on{background:var(--rot);border-color:var(--rot);}
.amp[data-v="gelb"].on{background:var(--gelb);border-color:var(--gelb);}
.amp[data-v="gruen"].on{background:var(--gruen);border-color:var(--gruen);}
.amp.chk{width:28px;height:28px;border-radius:8px;position:relative;}
.amp.chk.on::after{content:"✓";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px;}
.grp-label{font-family:'Anton',sans-serif;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);padding:12px 16px 2px;border-top:1px solid var(--line-soft);}
.stufe-note{padding:12px 16px 16px;border-top:1px solid var(--line-soft);}
.stufe-note textarea{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:11px 13px;min-height:64px;font-size:13.5px;line-height:1.5;resize:vertical;outline:none;}
.stufe-note textarea:focus{border-color:var(--orange);}

/* ===== SETTINGS / COMING ===== */
.coming{background:var(--surface);border:1px dashed var(--line);border-radius:var(--r-card);padding:34px 26px;text-align:center;}
.coming .c-ic{width:62px;height:62px;border-radius:14px;background:var(--orange);transform:rotate(-2deg);
  display:flex;align-items:center;justify-content:center;margin:0 auto 18px;}
.coming .c-ic svg{width:28px;height:28px;color:#fff;}
.coming h3{font-family:'Anton',sans-serif;text-transform:uppercase;font-size:20px;letter-spacing:.04em;margin-bottom:8px;}
.coming p{color:var(--muted);max-width:380px;margin:0 auto;font-size:14px;}

/* ===== ZEICHENFLÄCHE ===== */
[hidden]{display:none!important;}
.draw-wrap{position:relative;width:100%;height:100%;overflow:hidden;background:#f6f4ef;}
.draw-wrap.night{background:#23262b;}
#board{position:absolute;inset:0;touch-action:none;display:block;}
.draw-back{position:absolute;top:14px;left:14px;z-index:6;width:44px;height:44px;border-radius:12px;
  background:rgba(26,27,31,.82);backdrop-filter:blur(6px);color:#fff;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 14px rgba(0,0,0,.3);transition:transform .12s var(--pop);}
.draw-back svg{width:20px;height:20px;}
.draw-back:active{transform:scale(.9);}

.mag-ctrl{position:absolute;left:50%;top:14px;transform:translateX(-50%);z-index:9;display:flex;gap:4px;
  background:rgba(26,27,31,.93);backdrop-filter:blur(12px);border:1px solid #393c44;border-radius:14px;padding:6px;
  box-shadow:0 10px 30px rgba(0,0,0,.45);animation:fadeUp .2s var(--ease) both;}
.mag-ctrl button{width:42px;height:42px;border-radius:10px;background:#2a2c32;color:#f2efe9;font-size:19px;font-weight:800;
  display:flex;align-items:center;justify-content:center;transition:transform .12s var(--pop),background .15s var(--ease);}
.mag-ctrl button:active{transform:scale(.88);}
.mag-ctrl .mc-done{background:var(--orange);color:#fff;}

.draw-bar{position:absolute;left:50%;transform:translateX(-50%);bottom:calc(16px + env(safe-area-inset-bottom));z-index:6;
  display:flex;align-items:center;gap:3px;background:rgba(26,27,31,.93);backdrop-filter:blur(12px);border:1px solid #393c44;
  border-radius:18px;padding:7px;box-shadow:0 14px 38px rgba(0,0,0,.45);max-width:calc(100% - 20px);overflow-x:auto;
  scrollbar-width:none;}
.draw-bar::-webkit-scrollbar{display:none;}
.db-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 9px;border-radius:12px;color:#cfcabf;
  font-size:10px;font-weight:700;min-width:50px;transition:background .15s var(--ease),color .15s var(--ease),transform .12s var(--pop);}
.db-btn .db-ic{width:22px;height:22px;}
.db-btn .db-ic svg{width:22px;height:22px;}
.db-btn:active{transform:scale(.9);}
.db-btn.on{background:var(--orange);color:#fff;}
.db-sep{width:1px;align-self:stretch;background:#393c44;margin:6px 3px;flex:0 0 auto;}
.db-handle{position:relative;}
.db-handle.on{background:var(--orange);color:#fff;}
.db-dot{width:5px;height:5px;border-radius:50%;background:var(--orange);position:absolute;top:6px;right:9px;}

.tafel-drawer{position:absolute;top:14px;right:14px;bottom:calc(86px + env(safe-area-inset-bottom));z-index:7;
  width:min(320px,88vw);display:flex;flex-direction:column;background:rgba(26,27,31,.97);border:1px solid #393c44;
  border-radius:18px;box-shadow:0 18px 50px rgba(0,0,0,.5);transform:translateX(calc(100% + 28px));opacity:0;
  transition:transform .26s cubic-bezier(.16,.84,.44,1),opacity .2s var(--ease);pointer-events:none;}
.tafel-drawer.open{transform:translateX(0);opacity:1;pointer-events:auto;}
.td-head{display:flex;align-items:center;gap:6px;padding:10px 10px 0;flex:0 0 auto;}
.td-tabs{display:flex;gap:6px;flex:1;min-width:0;overflow-x:auto;scrollbar-width:none;}
.td-tabs::-webkit-scrollbar{display:none;}
.td-tab{flex:0 0 auto;padding:8px 12px;border-radius:10px;background:#2a2c32;color:#cfcabf;font-size:11.5px;
  font-weight:700;white-space:nowrap;transition:background .15s var(--ease),color .15s var(--ease);}
.td-tab.on{background:var(--orange);color:#fff;}
.td-close{width:32px;height:32px;border-radius:9px;background:#2a2c32;color:#cfcabf;flex:0 0 auto;
  display:flex;align-items:center;justify-content:center;font-size:15px;}
.td-close:active{transform:scale(.9);}
.td-body{flex:1 1 auto;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px;}
.td-sub-head{display:flex;align-items:center;gap:8px;margin-bottom:11px;}
.td-back{width:30px;height:30px;border-radius:8px;background:#2a2c32;color:#cfcabf;display:flex;align-items:center;
  justify-content:center;font-size:14px;flex:0 0 auto;}
.td-sub-title{font-weight:800;font-size:13.5px;color:#f2efe9;}

.pp-row{display:flex;gap:9px;align-items:center;justify-content:center;flex-wrap:wrap;}
.pp-row+.pp-row{margin-top:14px;}
.pp-lab{font-size:11px;font-weight:700;color:#9aa0a6;text-align:center;margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em;}
.sw{width:36px;height:36px;border-radius:50%;border:2.5px solid transparent;transition:transform .12s var(--pop);}
.sw.on{border-color:#fff;transform:scale(1.1);}
.sw:active{transform:scale(.9);}
.ws{width:46px;height:36px;border-radius:10px;background:#2a2c32;display:flex;align-items:center;justify-content:center;transition:background .15s var(--ease);}
.ws span{background:#f2efe9;border-radius:50%;display:block;}
.ws.on{background:var(--orange);}

.obj-tabs{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px;
  scrollbar-width:none;}
.obj-tabs::-webkit-scrollbar{display:none;}
.obj-tab{flex:0 0 auto;padding:7px 13px;border-radius:10px;background:#2a2c32;color:#cfcabf;font-size:11.5px;
  font-weight:700;white-space:nowrap;transition:background .15s var(--ease),color .15s var(--ease);}
.obj-tab.on{background:var(--orange);color:#fff;}
.obj-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.mag-item{display:flex;flex-direction:column;align-items:center;gap:5px;padding:9px 6px;border-radius:12px;background:#2a2c32;
  color:#cfcabf;font-size:10px;font-weight:700;width:auto;transition:transform .12s var(--pop),background .15s var(--ease);}
.mag-item:active{transform:scale(.94);background:#33363d;}
.mag-item img{width:34px;height:34px;pointer-events:none;}

.more-list{display:flex;flex-direction:column;gap:6px;}
.more-btn{display:flex;align-items:center;padding:12px 14px;border-radius:12px;background:#2a2c32;color:#f2efe9;
  font-size:13.5px;font-weight:700;text-align:left;transition:background .15s var(--ease),transform .12s var(--ease);}
.more-btn:active{transform:scale(.97);background:#33363d;}
.more-btn.on{background:var(--orange);color:#fff;}
.more-danger{color:#ff7a6b;}

#loadList{display:flex;flex-direction:column;gap:6px;}
.tb-load{flex:1;display:flex;flex-direction:column;align-items:flex-start;gap:2px;padding:10px 12px;border-radius:10px;background:#2a2c32;color:#f2efe9;}
.tb-load:active{background:#33363d;}
.tb-name{font-weight:700;font-size:13px;}
.tb-date{font-size:11px;color:#9aa0a6;}
.tb-del{width:44px;border-radius:10px;background:#3a2a2a;color:#ff7a6b;font-size:16px;display:flex;align-items:center;justify-content:center;}
.tb-empty{color:#9aa0a6;font-size:12.5px;padding:8px;}
.tb-load-row{display:flex;gap:6px;align-items:stretch;}

.form-pick{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-tile);padding:12px 14px;margin-bottom:14px;flex-wrap:wrap;}
.fpc-label{font-family:'Anton',sans-serif;text-transform:uppercase;letter-spacing:.06em;font-size:13px;color:var(--muted);}
.form-pick .pills{flex:1;}

/* ===== CONFETTI / TOAST ===== */
.confetti{position:fixed;inset:0;pointer-events:none;z-index:90;overflow:hidden;}
.confetti i{position:absolute;top:14%;width:9px;height:14px;border-radius:2px;opacity:0;animation:conf 1.4s var(--ease) forwards;}
@keyframes conf{0%{opacity:1;transform:translateY(0) translateX(0) rotate(0);}100%{opacity:0;transform:translateY(66vh) translateX(calc(var(--x)*44vw)) rotate(var(--r));}}
.toast{position:fixed;left:50%;bottom:calc(30px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(20px);
  background:#f2efe9;color:#1a1b1f;padding:13px 22px;border-radius:14px;font-weight:800;font-size:14px;
  box-shadow:0 12px 34px rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:all .3s var(--ease);z-index:80;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.undo{display:flex;align-items:center;gap:14px;pointer-events:auto;}
.toast.undo .ut-txt{font-weight:800;}
.toast.undo .ut-btn{background:#1a1b1f;color:#fff;border:none;padding:7px 14px;border-radius:9px;font-weight:800;font-size:13px;cursor:pointer;flex:0 0 auto;}
.toast.undo .ut-btn:active{transform:scale(.95);}
.fade-up{animation:fadeUp .32s var(--ease) both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
@media(max-width:600px){.nav-actions,.termine{grid-template-columns:1fr;}}
@media (prefers-reduced-motion: reduce){*{animation-duration:.001ms !important;transition-duration:.001ms !important;}}

/* ===== Erweiterung: Dashboard / Prüfungen / Statistik ===== */
.hero.compact{margin-bottom:16px}
.next-exam{position:relative;overflow:hidden;display:flex;align-items:center;gap:13px;
  background:linear-gradient(160deg,var(--glass),var(--glass-2));border:1px solid var(--glass-brd);border-radius:var(--r-card);padding:18px 19px;margin-bottom:18px;
  box-shadow:var(--elev-3),var(--inset-top),inset 0 0 60px var(--glass-glow);backdrop-filter:blur(16px)}
.next-exam::after{content:"";position:absolute;top:-40%;right:-20%;width:70%;height:120%;pointer-events:none;background:radial-gradient(circle,var(--glass-glow) 0%,transparent 65%)}
.next-exam.none{box-shadow:var(--elev-2),var(--inset-top)}
/* Nächster Schüler */
.next-stud{position:relative;overflow:hidden;background:linear-gradient(160deg,var(--gruen-soft),var(--glass-2));border:1px solid var(--gruen-line);border-radius:var(--r-card);padding:17px 18px;margin-bottom:18px;box-shadow:var(--elev-3),var(--inset-top);cursor:pointer;}
/* Fahrcheck-Karte */
.fc-card{background:linear-gradient(160deg,var(--glass),var(--glass-2));border:1px solid var(--glass-brd);border-radius:var(--r-card);padding:15px 16px;margin-bottom:18px;box-shadow:var(--elev-2),var(--inset-top);}
.fc-h{font-size:12px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.fc-cnt{background:var(--orange,#cf9a3e);color:#1a0f06;border-radius:20px;padding:1px 8px;font-size:11px;}
.fc-row{display:flex;align-items:center;gap:9px;padding:9px 0;border-top:1px solid var(--line-soft);}
.fc-row:first-of-type{border-top:none;}
.fc-info{flex:1;min-width:0;}
.fc-nm{font-weight:700;font-size:14px;}
.fc-meta{font-size:11.5px;color:var(--muted);margin-top:1px;}
.fc-yes{flex:0 0 auto;padding:8px 13px;border-radius:9px;font-size:12.5px;font-weight:800;color:#eaf1ec;background:linear-gradient(160deg,var(--gruen-2,#3a7350),var(--gruen,#2f5d3f));border:1px solid rgba(150,200,165,.25);box-shadow:inset 0 1px 0 rgba(190,220,200,.2);}
.fc-yes:active{transform:scale(.95);}
.fc-more{flex:0 0 auto;width:34px;height:34px;border-radius:9px;background:var(--surface-2);border:1px solid var(--line);color:var(--muted);font-size:17px;font-weight:800;}
.fc-more-note{font-size:12px;color:var(--muted);text-align:center;padding-top:8px;}
.fc-missing-link{width:100%;display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding:11px 13px;border-radius:11px;background:rgba(207,90,72,.1);border:1px solid rgba(207,90,72,.28);color:#e3a294;font-weight:700;font-size:13px;}
.fc-missing-eur{font-weight:800;}
.fc-miss-sum{background:rgba(207,90,72,.1);border:1px solid rgba(207,90,72,.28);border-radius:12px;padding:13px 15px;font-size:14px;color:#e3a294;margin-bottom:16px;line-height:1.5;}
.fc-miss-sum b{color:#f0b5a8;}
.fc-miss-row{display:flex;align-items:center;gap:9px;padding:12px 0;border-bottom:1px solid var(--line-soft);}
.fc-grp{margin-bottom:18px;}
.fc-grp-head{display:flex;align-items:center;justify-content:space-between;padding:6px 0 2px;border-bottom:2px solid var(--line);}
.fc-grp-head .fc-nm{font-weight:800;font-size:15px;}
.fc-grp-eur{font-weight:800;font-size:13px;color:#e3a294;}
.es-act.on{outline:2px solid var(--gruen-bright);outline-offset:-2px;}
.es-act.good{color:#bfe6c5;}
/* Historie-Timeline */
.hist-add{display:flex;gap:8px;margin-bottom:18px;}
.hist-add input{flex:1;background:var(--surface-2);border:1px solid var(--line);border-radius:11px;padding:12px 14px;color:var(--txt);font-size:14px;font-family:inherit;}
.hist-add button{flex:0 0 auto;background:var(--gruen);border:none;border-radius:11px;padding:0 18px;color:#fff;font-weight:800;font-size:14px;cursor:pointer;}
.htl{position:relative;padding-left:26px;}
.htl::before{content:"";position:absolute;left:7px;top:6px;bottom:6px;width:2px;background:var(--line);}
.htl-item{position:relative;padding:0 0 18px;}
.htl-item::before{content:"";position:absolute;left:-23px;top:4px;width:12px;height:12px;border-radius:50%;background:var(--gruen-bright);border:2px solid var(--bg);}
.htl-item.fc::before{background:#cf5a48;}
.htl-item.pruefung::before{background:#e0a44a;}
.htl-item.manual::before{background:#7aa7c7;}
.htl-date{font-size:12px;color:var(--faint);font-weight:700;letter-spacing:.3px;}
.htl-text{font-size:14.5px;font-weight:600;margin-top:2px;line-height:1.4;}
.htl-eur{display:inline-block;margin-top:3px;font-size:12.5px;font-weight:800;padding:2px 8px;border-radius:7px;}
.htl-eur.plus{background:rgba(74,139,69,.16);color:#9ed99a;}
.htl-eur.minus{background:rgba(207,90,72,.16);color:#e3a294;}
.htl-del{position:absolute;right:0;top:2px;background:none;border:none;color:var(--faint);font-size:16px;cursor:pointer;padding:4px;}
/* Nicht-Besteher */
.nb-row{background:var(--surface-2);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:10px;cursor:pointer;}
.nb-row:active{transform:scale(.99);}
.nb-top{display:flex;align-items:center;justify-content:space-between;}
.nb-name{font-weight:800;font-size:14.5px;}
.nb-date{font-size:12px;color:var(--faint);font-weight:700;}
.nb-meta{font-size:12px;color:var(--muted);margin-top:2px;}
.nb-grund{font-size:13.5px;color:#e3a294;margin-top:5px;font-weight:600;}
.nb-note{font-size:12.5px;color:var(--muted);margin-top:4px;font-style:italic;}
.next-stud.none{cursor:default;display:flex;align-items:center;gap:13px;background:linear-gradient(160deg,var(--glass),var(--glass-2));border-color:var(--glass-brd);}
.ns-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:9px;}
.ns-label{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:#9fc3ab;font-weight:800;}
.ns-time{font-family:'Playfair Display',serif;font-size:19px;font-weight:600;color:#bcd6c5;}
.ns-time span{font-size:13px;color:var(--muted);font-weight:400;}
.ns-name{font-family:'Playfair Display',serif;font-size:25px;font-weight:600;line-height:1.05;}
.ns-meta{font-size:13px;color:var(--muted);font-weight:600;margin-top:3px;}
.ns-actions{display:flex;gap:7px;margin-top:14px;}
.ns-act{flex:1;padding:9px 6px;border-radius:10px;font-size:11.5px;font-weight:700;background:var(--bg-soft);border:1px solid var(--line);color:var(--muted);transition:.15s;}
.ns-act:active{background:var(--surface-2);transform:scale(.96);}
.ns-empty{font-size:15px;color:var(--muted);font-weight:600;}
.next-stud.none .ns-ic{width:44px;height:44px;border-radius:13px;flex:0 0 auto;background:var(--surface-2);color:var(--faint);display:flex;align-items:center;justify-content:center;}
.ne-ic{width:48px;height:48px;border-radius:14px;flex:0 0 auto;position:relative;z-index:1;
  background:linear-gradient(150deg,#244134,#15231b);box-shadow:var(--inset-top),inset 0 -3px 8px rgba(0,0,0,.35),0 4px 12px rgba(0,0,0,.3);
  display:flex;align-items:center;justify-content:center}
.ne-ic svg{color:#bcd6c5}
.ne-body{flex:1;min-width:0;position:relative;z-index:1}
.ne-label{font-family:'Barlow',sans-serif;font-weight:700;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
.ne-date{font-family:'Playfair Display',serif;font-weight:600;font-size:26px;letter-spacing:.01em;margin-top:3px}
.ne-names{font-size:13px;color:var(--txt);font-weight:600;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ne-empty{font-size:14px;color:var(--muted);margin-top:6px;font-weight:600}
/* Dashboard Quick-Row */
.dash-quick-row{display:flex;gap:10px;margin-bottom:16px;}
.dq-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--line-soft);border-radius:14px;padding:14px 8px;font-size:12px;font-weight:800;color:var(--muted);}
.dq-btn svg{width:22px;height:22px;color:var(--gruen-bright,#4a8b45);}
.dq-btn:active{transform:scale(.96);}
/* Nächste Prüfung Card */
.nex-card{background:var(--surface);border:1px solid var(--line-soft);border-radius:16px;padding:16px;margin-bottom:16px;cursor:pointer;}
.nex-card.none{display:flex;align-items:center;gap:12px;}
.nex-card:active{transform:scale(.99);}
.nex-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;}
.nex-label{font-size:11px;font-weight:800;letter-spacing:.8px;color:var(--muted);text-transform:uppercase;margin-bottom:3px;}
.nex-date{font-size:18px;font-weight:800;font-family:'Playfair Display',serif;}
.nex-days{text-align:center;background:var(--gruen-soft);border:1px solid var(--gruen-line);border-radius:12px;padding:8px 14px;}
.nex-dn{display:block;font-size:22px;font-weight:800;color:var(--gruen-bright,#4a8b45);line-height:1;}
.nex-dl{display:block;font-size:10px;font-weight:700;color:var(--muted);margin-top:2px;}
.nex-student{border-top:1px solid var(--line-soft);padding-top:10px;}
.nex-name{font-size:15px;font-weight:800;margin-bottom:4px;}
.nex-lessons{font-size:12.5px;color:var(--muted);font-weight:600;line-height:1.5;}
.nex-lessons.warn{color:#e0843a;font-weight:800;}
.nex-empty{font-size:14px;color:var(--faint);}
.dash-tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-bottom:16px}
/* Auslastungs-Card (dezent) */
.cap-card{display:block;width:100%;text-align:left;background:var(--surface);border:1px solid var(--line-soft);border-radius:14px;padding:14px 16px;margin-bottom:8px;}
.cap-card:active{transform:scale(.99);}
.cap-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.cap-title{font-size:12px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);}
.cap-pct{font-size:17px;font-weight:800;}
.cap-bar{height:7px;border-radius:5px;background:var(--surface-2);overflow:hidden;margin-bottom:9px;}
.cap-fill{height:100%;border-radius:5px;transition:width .5s var(--ease);}
.cap-foot{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;color:var(--muted);line-height:1.4;}
.cap-dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto;}
.cap-detail{background:var(--surface-2);border-radius:12px;padding:6px 14px;}
.cap-drow{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--line-soft);font-size:13.5px;color:var(--muted);}
.cap-drow:last-child{border-bottom:none;}
.cap-drow b{color:var(--txt);font-size:14.5px;}
.d-tile{position:relative;overflow:hidden;background:linear-gradient(160deg,var(--glass),var(--glass-2));border:1px solid var(--glass-brd);border-radius:var(--r-tile);padding:16px 14px;
  display:flex;flex-direction:column;align-items:flex-start;gap:9px;text-align:left;box-shadow:var(--elev-2),var(--inset-top);backdrop-filter:blur(12px);
  transition:transform .2s var(--pop),box-shadow .25s}
.d-tile::before{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;background:linear-gradient(130deg,rgba(190,220,200,.08),transparent 35%)}
.d-tile:active{transform:translateY(-3px)}
.dt-n{font-family:'Playfair Display',serif;font-weight:600;font-size:32px;line-height:1;position:relative;z-index:1;
  background:linear-gradient(160deg,#fff 10%,#bcd6c5 90%);-webkit-background-clip:text;background-clip:text;color:transparent}
.dt-l{font-size:10.5px;color:var(--muted);font-weight:600;position:relative;z-index:1}
.dash-nav{display:flex;flex-direction:column;gap:11px}
/* ===== Dashboard-Kalender-Shortcut (Haupt-Einstieg) ===== */
.cal-shortcut{position:relative;overflow:hidden;display:flex;align-items:center;gap:15px;width:100%;text-align:left;
  background:linear-gradient(150deg,var(--akzent-bright),var(--akzent-dark));border:1px solid var(--orange-line);border-radius:var(--r-card);
  padding:17px 18px;margin-bottom:14px;box-shadow:var(--elev-2),var(--inset-top);
  transition:transform .18s var(--pop),box-shadow .25s var(--ease);}
.cal-shortcut::after{content:"";position:absolute;top:-50%;right:-10%;width:60%;height:170%;pointer-events:none;
  background:radial-gradient(circle,rgba(255,255,255,.18) 0%,transparent 60%);}
.cal-shortcut:active{transform:translateY(-3px) scale(.995);box-shadow:var(--elev-3),var(--inset-top);}
.cs-ic{width:50px;height:50px;border-radius:15px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;position:relative;z-index:1;

.toggle-row{display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px 16px}

.stat-grid4{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.two-mini{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mini-stat{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px 15px;position:relative;overflow:hidden}

.ms-l{font-size:11.5px;font-weight:800;margin-top:7px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}

.bar-row{margin-bottom:11px}
.bar-top{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:5px}

  background:linear-gradient(160deg,var(--gruen-2,#3a7350),var(--gruen,#2f5d3f));border:1px solid rgba(150,200,165,.25);
  box-shadow:inset 0 1px 0 rgba(190,220,200,.2),0 4px 10px rgba(0,0,0,.3);transition:transform .14s var(--pop)}

.rf-step{display:flex;align-items:center;gap:11px;margin:0 0 13px;}

  font-weight:800;font-size:14px;color:#eaf1ec;background:linear-gradient(150deg,var(--gruen-2,#3a7350),var(--gruen,#2f5d3f));
  box-shadow:inset 0 1px 0 rgba(190,220,200,.25),0 3px 8px rgba(0,0,0,.3);font-family:'Playfair Display',serif;}

.rf-hint{color:var(--rot);font-size:13px;font-weight:700;margin-top:14px;text-align:center;}

.shake{animation:shake .4s var(--ease)}
.pruefer-card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:15px 16px;margin-bottom:10px}

.pf-name{font-weight:800;font-size:15.5px}
.pf-quote{font-family:'Anton',sans-serif;font-size:20px;color:var(--orange)}
.pf-meta{font-size:12.5px;color:var(--muted);margin-top:4px}

/* ===== Prüfer-Akte ===== */
.mini-btn.ghost{background:var(--glass);border:1px solid var(--glass-brd);color:var(--txt);}
.pf-card{background:linear-gradient(160deg,var(--glass),var(--glass-2));border:1px solid var(--glass-brd);border-radius:var(--r-tile);margin-bottom:11px;overflow:hidden;box-shadow:0 8px 22px rgba(0,0,0,.28),inset 0 1px 0 var(--glass-brd-top);backdrop-filter:blur(10px);}
.pf-row{display:flex;align-items:stretch;}
.pf-main{flex:1;text-align:left;padding:15px 16px;min-width:0;}
.pf-nm{font-family:'Playfair Display',serif;font-weight:600;font-size:18px;}
.pf-sub{font-size:12.5px;color:var(--muted);margin-top:2px;font-weight:600;}
.pf-bang{flex:0 0 auto;width:50px;border-left:1px solid var(--glass-brd);font-family:'Playfair Display',serif;font-weight:700;font-size:22px;color:var(--muted);transition:.18s;}

.pl-d{font-family:'Playfair Display',serif;font-weight:600;font-size:19px;line-height:1;color:#bcd6c5;}
.pl-y{font-size:11px;color:var(--muted);font-weight:600;margin-top:1px;}
.pl-l{font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);font-weight:700;margin-top:3px;}
.pl-dash{font-size:18px;color:var(--faint);}
.pf-quick-note{font-size:13px;color:var(--muted);margin-top:10px;line-height:1.55;font-style:italic;}
.pr-brief{background:var(--gruen-soft);border:1px solid var(--gruen-line);border-radius:14px;padding:14px 15px;animation:up .4s var(--smooth) both;}
.pr-brief-h{font-size:12px;letter-spacing:.05em;text-transform:uppercase;color:#9fc3ab;font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}

.pr-brief-route{font-size:13px;line-height:1.6;margin-bottom:8px;}
.pr-brief-route b{color:#bcd6c5;}
.pr-brief-note{font-size:13px;color:var(--muted);font-style:italic;line-height:1.55;}
.pr-brief-empty{font-size:13px;color:var(--muted);line-height:1.55;}
.pf-bang.on,.pf-bang:active{background:var(--gruen-soft);color:#bcd6c5;}
.pf-quick{padding:0 16px 16px;border-top:1px solid var(--line-soft);}
.pf-quick-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px;}
.pq-k{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);font-weight:700;}
.pq-v{font-family:'Playfair Display',serif;font-size:18px;margin-top:1px;}
.pf-route-mini{font-size:12px;color:var(--muted);margin-top:10px;line-height:1.5;}
.pf-more{margin-top:12px;display:inline-flex;align-items:center;gap:5px;font-size:12.5px;font-weight:700;color:#9fc3ab;}

/* Tags */
.pf-tags{display:flex;flex-wrap:wrap;gap:7px;}
.pf-tag{font-size:12px;font-weight:700;background:var(--gruen-soft);border:1px solid var(--gruen-line);color:#bcd6c5;border-radius:20px;padding:6px 12px;display:inline-flex;align-items:center;gap:6px;}
.pf-tag.mini{font-size:11px;padding:4px 10px;}
.pf-tag.warn{background:rgba(207,90,72,.12);border-color:rgba(207,90,72,.3);color:#e3a294;}
.pf-tag.rm i{font-style:normal;opacity:.6;font-size:11px;}
.pf-tag.rm:active{opacity:.6;}
.pf-tag.add{background:transparent;border:1px dashed var(--line);color:var(--muted);}
.pf-tag.pick{background:var(--surface-2);border-color:var(--line);color:var(--txt);}
/* Akte-Hero + Stats */
.pf-hero{margin:6px 0 16px;}
.pf-hero-name{font-family:'Playfair Display',serif;font-weight:600;font-size:clamp(28px,7.5vw,38px);line-height:1.05;}
.pf-hero-beh{font-size:13px;color:var(--muted);font-weight:600;margin-top:2px;}
.pf-stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:18px;}
.pf-stat{background:linear-gradient(160deg,var(--glass),var(--glass-2));border:1px solid var(--glass-brd);border-radius:var(--r-tile);padding:14px 10px;text-align:center;box-shadow:inset 0 1px 0 var(--glass-brd-top);}
.ps-n{font-family:'Playfair Display',serif;font-weight:600;font-size:26px;line-height:1;}
.ps-l{font-size:11px;color:var(--muted);font-weight:600;margin-top:5px;}
.pf-block{margin-bottom:20px;}
.pf-block-h{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);font-weight:800;margin-bottom:10px;}
/* Strecken */
.pf-route{display:flex;align-items:flex-start;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px 13px;margin-bottom:9px;}
.pf-route-chain{flex:1;font-size:13.5px;font-weight:600;line-height:1.7;}
.pf-route-chain .arr{color:var(--gruen-bright,#4a8b45);font-weight:800;margin:0 2px;}
.pf-route-x{flex:0 0 auto;width:26px;height:26px;border-radius:8px;background:var(--bg-soft);color:var(--muted);font-size:11px;}
.pf-add-route{width:100%;border:1px dashed var(--line);border-radius:12px;padding:13px;color:#9fc3ab;font-weight:700;font-size:13.5px;background:var(--gruen-soft);}
#pfNote{width:100%;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:13px;color:var(--txt);font-size:14px;font-family:inherit;resize:vertical;}
.pf-note-hint{font-size:12px;color:var(--gruen-ampel,#4caf72);font-weight:700;margin-top:6px;}
.pf-exam{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line-soft);font-size:13px;}
